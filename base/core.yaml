  # LED ring: chooses what to show by priority (alarm > assistant > volume > timer > HA state).
  # On first entry into a reaction it saves the HA state (on/off+color+brightness);
  # once all reactions clear, it restores it. Effects refresh themselves (update_interval).
  - id: ring_update
    then:
      - lambda: |-
          int desired;
          if (id(g_mode) == 4 && id(g_ring_alarm)) desired = 1;                     // alarm
          else if (id(g_va_active) && id(g_ring_va)) desired = 20 + id(g_va_phase); // 21=listening 22=thinking 23=speaking
          else if (id(g_vol_show) && id(g_ring_vol_en)) desired = 5;               // volume (briefly, ~2 s)
          else if (id(g_timer_active) && id(g_ring_timer)) desired = 3;            // timer
          else desired = 0;                                                        // HA state
          if (desired == id(g_ring_cur)) return;       // no change -> do nothing (the effect animates itself)
          if (desired != 0 && !id(g_ring_override)) {  // entering a reaction: snapshot HA state (once)
            auto v = id(ring_light)->remote_values;
            id(g_ring_was_on) = v.is_on();
            id(g_ring_r) = v.get_red();
            id(g_ring_g) = v.get_green();
            id(g_ring_b) = v.get_blue();
            id(g_ring_bri) = v.get_brightness();
            id(g_ring_override) = true;
          }
          const char *eff = nullptr;
          if (desired == 1)       eff = "Alarm";
          else if (desired == 21) eff = "Listen";
          else if (desired == 22) eff = "Think";
          else if (desired == 23) eff = "Speak";
          else if (desired == 5)  eff = "Volume";
          else if (desired == 3)  eff = "Timer";
          if (eff != nullptr) {
            auto c = id(ring_light)->turn_on(); c.set_effect(eff); c.set_brightness(1.0f); c.perform();
          } else {                                     // all reactions cleared -> restore HA state
            id(g_ring_override) = false;
            if (id(g_ring_was_on)) {
              auto c = id(ring_light)->turn_on();
              c.set_effect("None");
              c.set_rgb(id(g_ring_r), id(g_ring_g), id(g_ring_b));
              c.set_brightness(id(g_ring_bri));
              c.perform();
            } else {
              id(ring_light)->turn_off().perform();
            }
          }
          id(g_ring_cur) = desired;
  # Shows volume on the ring for ~2 s while turning the knob (mode: restart), then returns to state/reaction.
  - id: ring_vol_flash
    mode: restart
    then:
      - lambda: 'id(g_vol_show) = true;'
      - script.execute: ring_update
      - delay: 2000ms
      - lambda: 'id(g_vol_show) = false;'
      - script.execute: ring_update
  # --- Timer as a SCREEN (page_timer): render + button controls ---
  - id: timer_render
    then:
      - lvgl.label.update:
          id: timer_big
          text: !lambda |-
            int s = id(g_timer_active) ? id(g_timer_secs) : id(g_set_min) * 60;
            if (s < 0) s = 0;
            char b[12]; snprintf(b, sizeof(b), "%d:%02d", s / 60, s % 60);
            return std::string(b);
      - lvgl.arc.update:
          id: timer_arc
          value: !lambda |-
            if (!id(g_timer_active)) return 100.0f;
            int tot = id(g_timer_total); if (tot <= 0) return 0.0f;
            float f = 100.0f * id(g_timer_secs) / tot;
            if (f < 0) f = 0; if (f > 100) f = 100;
            return f;
      - if:
          condition: { lambda: 'return id(g_timer_active);' }
          then:
            - lvgl.widget.hide: timer_play
            - lvgl.widget.show: timer_pause
            - lvgl.widget.show: timer_stop
            - lvgl.label.update:
                id: timer_pause_ic
                text: !lambda 'return id(g_timer_paused) ? std::string("") : std::string("");'
          else:
            - lvgl.widget.show: timer_play
            - lvgl.widget.hide: timer_pause
            - lvgl.widget.hide: timer_stop
      - script.execute: ring_update
  - id: timer_start
    then:
      - lambda: |-
          id(g_timer_secs) = id(g_set_min) * 60;
          id(g_timer_total) = id(g_timer_secs);
          id(g_timer_active) = true;
          id(g_timer_paused) = false;
          id(g_timer_local) = true;    // timer from the button -> the interval counts down and fires the alarm
      - script.execute: timer_render
  - id: timer_toggle
    then:
      - lambda: 'id(g_timer_paused) = !id(g_timer_paused);'
      - script.execute: timer_render
  - id: timer_halt
    then:
      - lambda: 'id(g_timer_active) = false; id(g_timer_paused) = false; id(g_timer_secs) = 0;'
      - script.execute: timer_render
