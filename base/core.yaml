text_sensor:
  - platform: wifi_info     # IP for the Info screen (settings)
    ip_address:
      id: wifi_ip
  # Control-tile states -> tile colour (on = accent, off = dark)
  - platform: homeassistant
    id: st_tile1
    entity_id: ${tile1_entity}
    on_value:
      - if:
          condition: { lambda: 'return x == "on";' }
          then:
            - lvgl.widget.update: { id: tile1, bg_color: 0xF5B83D, border_color: 0xFFD27A, shadow_opa: 70% }
            - lvgl.label.update: { id: tile1_ic, text_color: 0x231803 }
            - lvgl.label.update: { id: tile1_lbl, text_color: 0x231803 }
          else:
            - lvgl.widget.update: { id: tile1, bg_color: 0x161A22, border_color: 0x2A303C, shadow_opa: 0% }
            - lvgl.label.update: { id: tile1_ic, text_color: 0x707A8A }
            - lvgl.label.update: { id: tile1_lbl, text_color: 0x9AA3B0 }
  - platform: homeassistant
    id: st_tile2
    entity_id: ${tile2_entity}
    on_value:
      - if:
          condition: { lambda: 'return x == "on";' }
          then:
            - lvgl.widget.update: { id: tile2, bg_color: 0xF5B83D, border_color: 0xFFD27A, shadow_opa: 70% }
            - lvgl.label.update: { id: tile2_ic, text_color: 0x231803 }
            - lvgl.label.update: { id: tile2_lbl, text_color: 0x231803 }
          else:
            - lvgl.widget.update: { id: tile2, bg_color: 0x161A22, border_color: 0x2A303C, shadow_opa: 0% }
            - lvgl.label.update: { id: tile2_ic, text_color: 0x707A8A }
            - lvgl.label.update: { id: tile2_lbl, text_color: 0x9AA3B0 }
  - platform: homeassistant
    id: st_tile3
    entity_id: ${tile3_entity}
    on_value:
      - if:
          condition: { lambda: 'return x == "on";' }
          then:
            - lvgl.widget.update: { id: tile3, bg_color: 0xF5B83D, border_color: 0xFFD27A, shadow_opa: 70% }
            - lvgl.label.update: { id: tile3_ic, text_color: 0x231803 }
            - lvgl.label.update: { id: tile3_lbl, text_color: 0x231803 }
          else:
            - lvgl.widget.update: { id: tile3, bg_color: 0x161A22, border_color: 0x2A303C, shadow_opa: 0% }
            - lvgl.label.update: { id: tile3_ic, text_color: 0x707A8A }
            - lvgl.label.update: { id: tile3_lbl, text_color: 0x9AA3B0 }
  - platform: homeassistant
    id: st_tile4
    entity_id: ${tile4_entity}
    on_value:
      - if:
          condition: { lambda: 'return x == "on";' }
          then:
            - lvgl.widget.update: { id: tile4, bg_color: 0xF5B83D, border_color: 0xFFD27A, shadow_opa: 70% }
            - lvgl.label.update: { id: tile4_ic, text_color: 0x231803 }
            - lvgl.label.update: { id: tile4_lbl, text_color: 0x231803 }
          else:
            - lvgl.widget.update: { id: tile4, bg_color: 0x161A22, border_color: 0x2A303C, shadow_opa: 0% }
            - lvgl.label.update: { id: tile4_ic, text_color: 0x707A8A }
            - lvgl.label.update: { id: tile4_lbl, text_color: 0x9AA3B0 }
  # Weather: state (rainy/sunny/...) -> MDI icon on the home screen
  - platform: homeassistant
    id: wx_state
    entity_id: ${weather_entity}
    on_value:
      # Map the HA condition -> MDI glyph + a friendly UPPERCASE label, stash both in globals
      # (lbl_wx_ic reads the glyph; the Neon watchface reuses glyph + condition text).
      - lambda: |-
          std::string s = x, g, c;
          if (s == "sunny") { g = "󰖙"; c = "SUNNY"; }
          else if (s == "clear-night") { g = "󰖔"; c = "CLEAR"; }
          else if (s == "partlycloudy") { g = "󰖕"; c = "PARTLY CLOUDY"; }
          else if (s == "fog") { g = "󰖑"; c = "FOG"; }
          else if (s == "windy" || s == "windy-variant") { g = "󰖝"; c = "WINDY"; }
          else if (s == "lightning" || s == "lightning-rainy") { g = "󰖓"; c = "STORM"; }
          else if (s == "pouring") { g = "󰖖"; c = "POURING"; }
          else if (s == "rainy") { g = "󰖗"; c = "RAINY"; }
          else if (s == "snowy" || s == "snowy-rainy" || s == "hail") { g = "󰖘"; c = "SNOW"; }
          else { g = "󰖐"; c = "CLOUDY"; }
          id(g_nf_glyph) = g; id(g_nf_cond) = c;
      - lvgl.label.update: { id: lbl_wx_ic, text: !lambda 'return id(g_nf_glyph);' }
###############################################################################
# LVGL - home page (clock + VA status) and PLAYER page (album art)
###############################################################################
interval:
  # Boot splash: type out "HELLO!" then cross-fade to the clock (~5 s), once at startup.
  - interval: 150ms
    then:
      - if:
          condition: { lambda: 'return id(g_boot);' }
          then:
            - lambda: 'id(g_boot_t)++;'
            - lvgl.label.update: { id: lbl_boot, text: !lambda 'std::string w = "HELLO!"; int n = id(g_boot_t); if (n > (int) w.size()) n = w.size(); return w.substr(0, n);' }
            - if:
                condition: { lambda: 'return id(g_boot_t) >= 33;' }   # 33 * 150ms ~= 5 s
                then:
                  - lambda: 'id(g_boot) = false;'
                  - light.turn_off: ring_light                        # stop the boot ring animation
                  - safe_mode.mark_successful:                        # commit this OTA image now so a restart won't roll back to the old firmware
                  - lvgl.page.show: { id: page_home, animation: fade_in, time: 400ms }
  - interval: 2s
    then:
      - lambda: |-
          id(g_idle_ticks)++;
          bool off = false;
          if (id(g_night) && id(ha_time).now().is_valid()) {
            int h = id(ha_time).now().hour, f = id(g_night_from), t = id(g_night_to);
            bool inwin = (f < t) ? (h >= f && h < t) : (h >= f || h < t);
            if (inwin && id(g_idle_ticks) * 2 >= 10) off = true;
          }
          int secs[5] = {0, 15, 30, 60, 300};
          int bs = secs[id(g_blank_idx) % 5];
          if (bs > 0 && id(g_idle_ticks) * 2 >= bs) off = true;
          if (id(g_va_active) || id(g_mode) == 3 || id(g_mode) == 4) off = false;
          id(g_want_off) = off;
      - if:
          condition: { lambda: 'return id(g_want_off) && !id(g_disp_off);' }
          then:
            - light.turn_off: backlight_light
            - lambda: 'id(g_disp_off) = true;'
      - if:
          condition: { lambda: 'return !id(g_want_off) && id(g_disp_off);' }
          then:
            - light.turn_on: { id: backlight_light, brightness: !lambda 'return id(g_bright) / 100.0f;' }
            - lambda: 'id(g_disp_off) = false;'
  - interval: 1s
    then:
      # TZ self-heal: some ESPHome builds reset the device timezone to UTC at runtime (e.g. on a
      # menu restart or when a log/API client without a TZ reconnects), so the clock jumps to UTC.
      # g_tz_posix was resolved at boot (from the `timezone` substitution, or the time component);
      # re-assert it every tick so a stray UTC reset can't stick. (No-op once it is correct.)
      - lambda: 'if (!id(g_tz_posix).empty()) { setenv("TZ", id(g_tz_posix).c_str(), 1); tzset(); }'
      # Battery: while charging - "filling" animation; when full (≥99%) - static full icon.
      - lambda: 'if (id(g_charging)) id(g_chg_anim) = (id(g_chg_anim) + 1) % 5;'
      - script.execute: batt_render
      - lvgl.label.update:
          id: lbl_clock
          text: !lambda |-
            if (!id(ha_time).now().is_valid()) return std::string("--:--");
            return id(ha_time).now().strftime("%H:%M");
      - lvgl.label.update:
          id: lbl_date
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("");
            static const char* d[8] = {"","Su","Mo","Tu","We","Th","Fr","Sa"};
            std::string day = (t.day_of_week >= 1 && t.day_of_week <= 7) ? std::string(d[t.day_of_week]) : std::string("");
            return t.strftime("%d.%m") + "  " + day;
      - if:   # Neon watchface: refresh its widgets while it is the active home face
          condition: { lambda: 'return id(g_watchface) == 1 && id(g_base) == 0;' }
          then: [ script.execute: neon_render ]
      # Screen-timer countdown (g_timer_active). From the button: local. From VA: HA calls finished, locally smooth.
      - if:
          condition:
            lambda: 'return id(g_timer_active) && !id(g_timer_paused);'
          then:
            - lambda: 'id(g_timer_secs)--;'
            - script.execute: timer_render
            - if:   # button timer reached zero -> alarm (with VA the alarm fires on on_timer_finished)
                condition: { lambda: 'return id(g_timer_local) && id(g_timer_secs) <= 0;' }
                then:
                  - script.execute: alarm_start
      # Timer badge on the home screen (red) - time left (rounded up to minutes)
      - if:
          condition: { lambda: 'return id(g_timer_active);' }
          then:
            - lvgl.widget.show: lbl_timer
            - lvgl.label.update:
                id: lbl_timer
                text: !lambda |-
                  int s = id(g_timer_secs); if (s < 0) s = 0;
                  int m = (s + 59) / 60;
                  char b[24]; snprintf(b, sizeof(b), " %d min", m);
                  return std::string(b);
          else:
            - lvgl.widget.hide: lbl_timer
      - if:   # refresh the alarm overlay every second
          condition:
            lambda: 'return id(g_mode) == 4;'
          then:
            - script.execute: ui_render
      - if:   # alarm: repeat the sound every ~2 s
          condition:
            lambda: 'return id(g_mode) == 4;'
          then:
            - lambda: 'id(g_alarm_cnt)++;'
            - if:
                condition:
                  lambda: 'return id(g_alarm_cnt) % 2 == 0;'
                then:
                  - media_player.speaker.play_on_device_media_file:
                      id: media_player_speaker
                      media_file: alarm_sound
                      announcement: true

