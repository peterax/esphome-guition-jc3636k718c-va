###############################################################################
# Guition JC3636K718C (1.8" 360x360 ROUND KNOB, ESP32-S3) - core config
# Pins and init_sequence from the OFFICIAL manufacturer demo (JC3636K718_knob_EN),
# files pincfg.h + scr_st77916.h. This is the correct pinout for THIS board
# (different from the JC3636W518!).
#
# Always-on core: display (ST77916/QSPI) + touch (CST816) + knob + audio + voice assistant +
# LED ring + the clock home screen, control tiles and settings. Optional carousel screens
# (player, timer, games, weather, demo) live as packages in base/screens/ - see base/screens/README.md.
###############################################################################

substitutions:
  name: voice-knob
  friendly_name: "Voice Knob"
  # Clock timezone. HA does not push its zone to the device, so set yours here. Use a friendly IANA
  # name (e.g. Europe/Warsaw, America/New_York) - core maps the common ones to the POSIX form the
  # device needs (it has no IANA database). For a zone not in that table, paste its POSIX string
  # instead (see https://github.com/nayarsystems/posix_tz_db/blob/master/zones.csv). DST automatic.
  timezone: "Europe/Warsaw"
  # For album art: base URL of your HA + the media_player entity (change if different)
  ha_base_url: "http://homeassistant.local:8123"
  player_entity: media_player.voice_knob_player
  # On-device wake word. Built-in models: alexa, okay_nabu, hey_jarvis, hey_mycroft.
  wake_word: "alexa"
  # Entities for the home screen (toggle each in Settings -> Home). Change if different.
  weather_entity: weather.home
  room_temp_entity: sensor.room_temperature
  room_hum_entity: sensor.room_humidity
  climate_entity: climate.home   # thermostat screen target (a climate.* entity)
  # Control tiles (swipe up): 4 toggleable HA entities, each with an icon + a name. Any domain.
  # tileN_icon = a name from the built-in set: bulb lamp led power plug switch fan ac heater
  # thermometer lock unlock door blinds tv speaker bell wifi home flash. The same icon may
  # repeat across tiles. (For an icon outside the set, paste its glyph or a \U000Fxxxx code.)
  tile1_entity: light.desk_lamp
  tile1_icon: "bulb"
  tile1_name: "Lamp"
  tile2_entity: switch.neon
  tile2_icon: "flash"
  tile2_name: "Neon"
  tile3_entity: light.led_strip
  tile3_icon: "led"
  tile3_name: "LED strip"
  tile4_entity: light.desk_lamp
  tile4_icon: "power"
  tile4_name: "Tile 4"
  # Sensors screen (knob cycles): up to 6 read-only HA entities, one shown big at a time.
  # Set as many glanceN_entity as you want (+ a name, optional icon name); leave the rest at
  # their default (a non-existent entity) and they're skipped.
  glance1_entity: sensor.power
  glance1_name: "Power"
  glance1_icon: "flash"
  glance2_entity: sensor.va_glance_unused2
  glance2_name: ""
  glance2_icon: ""
  glance3_entity: sensor.va_glance_unused3
  glance3_name: ""
  glance3_icon: ""
  glance4_entity: sensor.va_glance_unused4
  glance4_name: ""
  glance4_icon: ""
  glance5_entity: sensor.va_glance_unused5
  glance5_name: ""
  glance5_icon: ""
  glance6_entity: sensor.va_glance_unused6
  glance6_name: ""
  glance6_icon: ""
  forecast_entity: sensor.va_weekly_forecast   # weather screen forecast (HA helper, see base/screens/weather.ha-helper.yaml)
  # Carousel screen order (left-to-right). Screens not included in the build are skipped.
  screen_order: "clock,player,timer,cars,space,snake,weather,thermostat,sensors,demo"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 80000000L
    board_build.f_cpu: 240000000L
  on_boot:
    - priority: 800
      then:
        - lambda: |-
            id(g_order_n) = 0;
            id(g_set_n) = 0;
            id(g_set_labels) = "";
            for (int i = 0; i < 16; i++) id(g_present)[i] = false;
            id(g_present)[0] = true;   // clock is always present
            id(g_wgrp_n) = 0; id(g_wgrp_labels) = ""; id(g_wgrp_idx) = 0;
            id(g_wopt_n) = 0; id(g_wcur_n) = 0; id(g_wopt_idx) = 0;
    - priority: 790
      then:
        - lambda: |-
            // core settings list: label + the g_mode each opens. (Screen packages add their
            // own entries under Widgets via the g_wgrp_* / g_wopt_* registry, not here.)
            id(g_set_labels) += "Display";    id(g_set_items)[id(g_set_n)++] = 11;
            id(g_set_labels) += "\nHome";       id(g_set_items)[id(g_set_n)++] = 12;
            id(g_set_labels) += "\nWidgets";    id(g_set_items)[id(g_set_n)++] = 17;
            id(g_set_labels) += "\nRing";      id(g_set_items)[id(g_set_n)++] = 16;
            id(g_set_labels) += "\nAssistant"; id(g_set_items)[id(g_set_n)++] = 13;
    - priority: 760
      then:
        - lambda: |-
            // Resolve a friendly icon name to its MDI glyph. Unknown -> use the value as-is.
            auto ic = [](const std::string &s) -> std::string {
              if (s == "bulb" || s == "light") return "\U000f0335";
              if (s == "lamp") return "\U000f06b5";
              if (s == "led" || s == "strip") return "\U000f07d6";
              if (s == "power") return "\U000f0425";
              if (s == "plug") return "\U000f06a5";
              if (s == "switch") return "\U000f0521";
              if (s == "fan") return "\U000f0210";
              if (s == "ac" || s == "aircon") return "\U000f001b";
              if (s == "heater" || s == "radiator") return "\U000f0438";
              if (s == "thermometer" || s == "temp") return "\U000f050f";
              if (s == "lock") return "\U000f033e";
              if (s == "unlock") return "\U000f033f";
              if (s == "door") return "\U000f081a";
              if (s == "blinds") return "\U000f00ac";
              if (s == "tv") return "\U000f0502";
              if (s == "speaker") return "\U000f04c3";
              if (s == "bell") return "\U000f009a";
              if (s == "wifi") return "\U000f05a9";
              if (s == "home") return "\U000f02dc";
              if (s == "flash") return "\U000f0241";
              if (s == "air" || s == "pm" || s == "airquality") return "\U000f0d44";
              if (s == "plant" || s == "sprout" || s == "moisture") return "\U000f0e66";
              if (s == "plex") return "\U000f06ba";
              if (s == "server") return "\U000f048b";
              if (s == "shield" || s == "alarm" || s == "security") return "\U000f068a";
              return s;
            };
            id(g_tile1_glyph) = ic("${tile1_icon}");
            id(g_tile2_glyph) = ic("${tile2_icon}");
            id(g_tile3_glyph) = ic("${tile3_icon}");
            id(g_tile4_glyph) = ic("${tile4_icon}");
    - priority: 595
      then:
        - lambda: 'id(g_set_labels) += "\nSystem"; id(g_set_items)[id(g_set_n)++] = 15;'   # always last
    - priority: 600
      then:
        - lambda: |-
            // build the carousel order from ${screen_order}, skipping screens not in this build
            std::string s = "${screen_order}";
            size_t pos = 0;
            while (true) {
              size_t comma = s.find(',', pos);
              std::string tok = (comma == std::string::npos) ? s.substr(pos) : s.substr(pos, comma - pos);
              while (!tok.empty() && tok.front() == ' ') tok.erase(tok.begin());
              while (!tok.empty() && tok.back() == ' ') tok.pop_back();
              int id = -1;
              if (tok == "clock") id = 0;
              else if (tok == "player") id = 1;
              else if (tok == "timer") id = 2;
              else if (tok == "cars") id = 3;
              else if (tok == "space") id = 4;
              else if (tok == "weather") id = 5;
              else if (tok == "demo") id = 6;
              else if (tok == "thermostat") id = 7;
              else if (tok == "sensors") id = 8;
              else if (tok == "snake") id = 9;
              if (id >= 0 && id < 16 && id(g_present)[id]) id(g_order)[id(g_order_n)++] = id;
              if (comma == std::string::npos) break;
              pos = comma + 1;
            }
            if (id(g_order_n) == 0) id(g_order)[id(g_order_n)++] = 0;   // safety: keep the clock
    - priority: -50
      then:
        - if:
            condition: { lambda: 'return id(g_factory_reset);' }
            then:
              - delay: 2s          # give the game packages' interval watchers time to clear their scores
              - lambda: 'id(g_factory_reset) = false;'
    - priority: -100
      then:
        - light.turn_on: { id: ring_light, effect: "Boot", brightness: 80% }   # boot splash: azure comet circles the ring while "HELLO!" shows (turned off when the splash ends)
        - lambda: |-
            // The device has no IANA tz database, so the clock needs a POSIX TZ string. To keep the
            // `timezone` substitution friendly, map common IANA names -> POSIX here and force the
            // result into the environment ourselves (on some builds the homeassistant time platform
            // never applies the zone and the clock sticks on UTC). An explicit POSIX string is used
            // as-is; an IANA name not in the table falls back to whatever the time platform resolved.
            // The 1s interval re-applies g_tz_posix so a runtime reset to UTC can't stick.
            static const char* TZMAP[][2] = {
              {"Europe/Warsaw","CET-1CEST,M3.5.0,M10.5.0/3"},
              {"Europe/London","GMT0BST,M3.5.0/1,M10.5.0"},
              {"Europe/Berlin","CET-1CEST,M3.5.0,M10.5.0/3"},
              {"Europe/Paris","CET-1CEST,M3.5.0,M10.5.0/3"},
              {"Europe/Madrid","CET-1CEST,M3.5.0,M10.5.0/3"},
              {"Europe/Rome","CET-1CEST,M3.5.0,M10.5.0/3"},
              {"Europe/Amsterdam","CET-1CEST,M3.5.0,M10.5.0/3"},
              {"Europe/Brussels","CET-1CEST,M3.5.0,M10.5.0/3"},
              {"Europe/Vienna","CET-1CEST,M3.5.0,M10.5.0/3"},
              {"Europe/Prague","CET-1CEST,M3.5.0,M10.5.0/3"},
              {"Europe/Zurich","CET-1CEST,M3.5.0,M10.5.0/3"},
              {"Europe/Copenhagen","CET-1CEST,M3.5.0,M10.5.0/3"},
              {"Europe/Stockholm","CET-1CEST,M3.5.0,M10.5.0/3"},
              {"Europe/Oslo","CET-1CEST,M3.5.0,M10.5.0/3"},
              {"Europe/Budapest","CET-1CEST,M3.5.0,M10.5.0/3"},
              {"Europe/Lisbon","WET0WEST,M3.5.0/1,M10.5.0"},
              {"Europe/Athens","EET-2EEST,M3.5.0/3,M10.5.0/4"},
              {"Europe/Helsinki","EET-2EEST,M3.5.0/3,M10.5.0/4"},
              {"Europe/Bucharest","EET-2EEST,M3.5.0/3,M10.5.0/4"},
              {"Europe/Sofia","EET-2EEST,M3.5.0/3,M10.5.0/4"},
              {"Europe/Kyiv","EET-2EEST,M3.5.0/3,M10.5.0/4"},
              {"Europe/Moscow","MSK-3"},
              {"Europe/Istanbul","<+03>-3"},
              {"Europe/Dublin","IST-1GMT0,M10.5.0,M3.5.0/1"},
              {"America/New_York","EST5EDT,M3.2.0,M11.1.0"},
              {"America/Chicago","CST6CDT,M3.2.0,M11.1.0"},
              {"America/Denver","MST7MDT,M3.2.0,M11.1.0"},
              {"America/Los_Angeles","PST8PDT,M3.2.0,M11.1.0"},
              {"America/Phoenix","MST7"},
              {"America/Toronto","EST5EDT,M3.2.0,M11.1.0"},
              {"America/Sao_Paulo","<-03>3"},
              {"America/Mexico_City","CST6"},
              {"Asia/Tokyo","JST-9"},
              {"Asia/Shanghai","CST-8"},
              {"Asia/Hong_Kong","HKT-8"},
              {"Asia/Singapore","<+08>-8"},
              {"Asia/Dubai","<+04>-4"},
              {"Asia/Kolkata","IST-5:30"},
              {"Asia/Seoul","KST-9"},
              {"Asia/Jerusalem","IST-2IDT,M3.4.4/26,M10.5.0"},
              {"Australia/Sydney","AEST-10AEDT,M10.1.0,M4.1.0/3"},
              {"Australia/Perth","AWST-8"},
              {"Pacific/Auckland","NZST-12NZDT,M9.5.0,M4.1.0/3"},
              {"UTC","UTC0"},
            };
            std::string cfg = "${timezone}";
            std::string tz = cfg;
            bool found = false;
            for (auto &e : TZMAP) if (cfg == e[0]) { tz = e[1]; found = true; break; }
            if (!found && cfg.find('/') != std::string::npos) {
              const char* en = getenv("TZ"); if (en && en[0]) tz = en;   // unknown IANA -> platform's resolved zone
            }
            id(g_tz_posix) = tz;
            if (!tz.empty()) { setenv("TZ", tz.c_str(), 1); tzset(); }
        - script.execute: night_apply    # brightness per g_bright / night mode
        - script.execute: disp_apply     # show/hide weather + temp/humidity per settings
        - script.execute: settings_build # push the dynamic settings list into the roller
        - script.execute: home_roller_build  # Home roller line 3 = current watchface
        - script.execute: face_apply     # apply the saved home watchface (Classic / Neon)
        - lvgl.label.update: { id: tile1_ic, text: !lambda 'return id(g_tile1_glyph);' }   # tiles get their icon glyph now (set at priority 760)
        - lvgl.label.update: { id: tile2_ic, text: !lambda 'return id(g_tile2_glyph);' }
        - lvgl.label.update: { id: tile3_ic, text: !lambda 'return id(g_tile3_glyph);' }
        - lvgl.label.update: { id: tile4_ic, text: !lambda 'return id(g_tile4_glyph);' }

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB          # 16 MB flash
  partitions: partitions.csv  # MAX app partitions (~7.9 MB/slot) - see partitions.csv. Requires USB flashing!
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO   # less logging = less overhead (DEBUG was very noisy, esp. during VA)

api:

ota:
  - platform: esphome

# OTA rollback safety. On esp-idf the bootloader rolls back to the PREVIOUS firmware if the device
# resets before the boot is marked "good" (default 1 min). That is why a quick "Restart" from the
# menu right after flashing booted the OLD build again. We shorten that window AND mark the boot good
# as soon as the splash finishes (see the boot interval -> safe_mode.mark_successful).
safe_mode:
  boot_is_good_after: 30s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Setup"

captive_portal:

time:
  - platform: homeassistant
    id: ha_time
    # The homeassistant time platform syncs the epoch from HA but NOT the timezone, so
    # without this the clock falls back to the compile host's zone (often UTC). Set your
    # IANA zone in the `timezone` substitution (top of file / thin config). DST is handled.
    timezone: "${timezone}"

###############################################################################
# AUDIO - DAC PCM5100A (out) + microphone + voice assistant (HA Assist)
# DAC:  BCK=3  WS=45  DO=42   (no MCK)   MUTE=46 (LOW=mute -> we hold HIGH)
# MIC:  data(SD)=4  clk(SCK)=5  -> configured as PDM
###############################################################################
switch:
  - platform: gpio
    pin: GPIO46
    name: "DAC unmute"
    id: dac_unmute
    restore_mode: ALWAYS_ON   # HIGH = not muted

i2s_audio:
  - id: i2s_out            # DAC PCM5100A
    i2s_bclk_pin: GPIO3
    i2s_lrclk_pin: GPIO45
  - id: i2s_in             # PDM microphone: clock=GPIO5
    i2s_lrclk_pin: GPIO5

speaker:
  # Raw I2S output to the DAC
  - platform: i2s_audio
    id: i2s_speaker_raw
    i2s_audio_id: i2s_out
    i2s_dout_pin: GPIO42
    dac_type: external
    channel: stereo
  # Mixer: combines the music channel and the announcement (TTS) channel on one speaker
  - platform: mixer
    id: mixing_speaker
    output_speaker: i2s_speaker_raw
    source_speakers:
      - id: announcement_mixing_input
      - id: media_mixing_input
  # Resamplers (match source sample rates to the mixer)
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input

# Player visible in HA / Music Assistant (album art etc.)
media_player:
  - platform: speaker
    name: "Player"
    id: media_player_speaker
    announcement_pipeline:
      speaker: announcement_resampling_speaker
    media_pipeline:
      speaker: media_resampling_speaker
    files:
      - id: wake_sound
        file: https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/main/assets/sounds/wake.wav   # beep after the wake word
      - id: alarm_sound
        file: https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/main/assets/sounds/alarm.wav  # timer alarm (generated with make_sounds.py)

microphone:
  - platform: i2s_audio
    id: i2s_microphone
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO4
    adc_type: external
    pdm: true
    sample_rate: 16000
    bits_per_sample: 16bit

voice_assistant:
  id: va
  microphone: i2s_microphone
  speaker: announcement_resampling_speaker   # TTS via the announcement channel (ducks the music)
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  # Wake word works only when connected to HA (Assist pipeline)
  on_client_connected:
    - micro_wake_word.start:
  on_client_disconnected:
    - micro_wake_word.stop:
  on_listening:
    - lambda: |-
        id(g_va_active) = true;
        id(g_tts_played) = false;
        id(g_va_phase) = 1;
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 20
        duration: 0.2s
    - lvgl.label.update: { id: va_text, text: "Listening..." }
    - script.execute: va_show
    - script.execute: ring_update
  on_stt_end:
    - lambda: 'id(g_va_phase) = 2;'
    - lvgl.label.update: { id: va_text, text: "Thinking..." }
    - script.execute: ring_update
  on_tts_start:
    - lambda: |-
        id(g_tts_played) = true;
        id(g_va_phase) = 3;
    - lvgl.label.update: { id: va_text, text: "Speaking..." }
    - script.execute: ring_update
  # TTS actually stopped -> clear the flag, hide the overlay, restore music volume
  on_tts_stream_end:
    - lambda: 'id(g_va_active) = false;'
    - script.execute: va_hide
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 0.5s
    - script.execute: ring_update
  on_end:
    # Cleanup only when there was NO TTS (command without a response); otherwise on_tts_stream_end handles it
    - if:
        condition:
          lambda: 'return !id(g_tts_played);'
        then:
          - lambda: 'id(g_va_active) = false;'
          - script.execute: va_hide
          - mixer_speaker.apply_ducking:
              id: media_mixing_input
              decibel_reduction: 0
              duration: 0.3s
    - micro_wake_word.start:        # resume listening for the wake word
    - script.execute: ring_update
  on_error:
    - lambda: 'id(g_va_active) = false;'
    - script.execute: va_hide
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 0.3s
    - micro_wake_word.start:
    - script.execute: ring_update
  # --- Timers set by VOICE (HA counts down, the puck shows the same screen as the knob timer) ---
  on_timer_started:
    - lambda: |-
        id(g_timer_secs) = (int) timer.seconds_left;
        id(g_timer_total) = (int) timer.seconds_left;
        id(g_timer_active) = true;
        id(g_timer_paused) = false;
        id(g_timer_local) = false;   // HA counts down and will call finished; locally just smooth display
    - script.execute: timer_render
  on_timer_updated:
    - lambda: |-
        id(g_timer_secs) = (int) timer.seconds_left;
        if (timer.is_active) { id(g_timer_active) = true; id(g_timer_paused) = false; }
    - script.execute: timer_render
  on_timer_finished:
    - script.execute: alarm_start
  on_timer_cancelled:
    - lambda: 'id(g_timer_active) = false; id(g_timer_paused) = false; id(g_timer_secs) = 0;'
    - script.execute: timer_render

###############################################################################
# WAKE WORD on-device (built-in micro_wake_word, no external component; model = ${wake_word})
###############################################################################
micro_wake_word:
  microphone: i2s_microphone
  vad:
  models:
    - model: ${wake_word}
  on_wake_word_detected:
    - lambda: |-
        id(g_va_active) = true;
        id(g_va_phase) = 1;
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 20
        duration: 0.15s
    - lvgl.label.update: { id: va_text, text: "Yes?" }
    - script.execute: va_show
    - if:
        condition: { lambda: 'return id(g_beep_ww);' }
        then:
          - media_player.speaker.play_on_device_media_file:
              id: media_player_speaker
              media_file: wake_sound
              announcement: true
    - voice_assistant.start:
    - script.execute: ring_update

# Knob - volume handling is in the `binary_sensor` section (two directional pulses).
# ──────────────────────────────────────────────────────────────────────────
# We DON'T USE rotary_encoder: diagnostics (esplog.py logs) showed this knob
# does NOT produce interleaved A/B quadrature - direction is encoded by WHICH pin pulses
# (left=GPIO2, right=GPIO1). That's why the PCNT-based rotary_encoder counted zero.
# The block below is kept as reference (in case a real
# quadrature encoder ever shows up). See binary_sensor: knob_left / knob_right.
# ──────────────────────────────────────────────────────────────────────────
# sensor:
#   - platform: rotary_encoder
#     name: "Knob"
#     id: knob
#     pin_a:
#       number: GPIO2
#       mode:
#         input: true
#         pullup: true
#     pin_b:
#       number: GPIO1
#       mode:
#         input: true
#         pullup: true
#     on_clockwise:
#       - media_player.volume_up:
#           id: media_player_speaker
#     on_anticlockwise:
#       - media_player.volume_down:
#           id: media_player_speaker

# Variables for swipe gestures: dx/dy relative to touch start (x_org/y_org)
globals:
  - id: g_va_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_tts_played
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_x0
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_y0
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_t0
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: g_dx
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_dy
    type: int
    restore_value: no
    initial_value: '0'
  # --- UI mode system ---  0=normal 1=menu 2=timer_set 3=timer_run 4=alarm
  - id: g_mode
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_mode0        # snapshot of the mode at gesture time (routing), so one gesture doesn't cascade
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_gesture      # 0=tap 1=hold 2=left 3=right 4=up 5=down -1=ignore
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_vol_shown    # true = volume overlay on top (tap hides it and consumes the click)
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_cur_page     # current page: 0=base 1=page_mode 2=page_settings 3=page_controls
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_exit_anim    # one-shot direction of the mode-exit animation: 0=right, 1=down
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_show_weather # Display: show weather on the home screen (persistent)
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: g_show_climate # Display: show room temperature+humidity (persistent)
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: g_watchface    # Home watchface: 0 = Classic, 1 = Neon (persistent)
    type: int
    restore_value: yes
    initial_value: '0'
  - id: g_nf_glyph     # current weather MDI glyph (set when the weather state changes; reused by the Neon face)
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: g_nf_cond      # current weather condition, friendly UPPERCASE (Neon face)
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: g_night        # Night mode: screen dimming (persistent)
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: g_disp_idx     # selection in the Display submenu (roller)
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_base        # current carousel screen id (fixed: 0=clock 1=player 2=timer 3=cars 4=space 5=weather 6=demo)
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_timer_active # timer has an active session (running or paused) - regardless of screen
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_timer_paused
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_timer_total  # total timer time (s) - for the progress ring
    type: int
    restore_value: no
    initial_value: '300'
  - id: g_set_min      # default timer minutes (after restart); the knob changes it
    type: int
    restore_value: no
    initial_value: '60'
  - id: g_timer_secs   # remaining seconds (display + local countdown)
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_timer_local  # true = knob timer (we count down locally); false = from VA (HA counts down)
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_alarm_cnt
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_bright       # screen brightness in % (settings)
    type: int
    restore_value: no
    initial_value: '100'
  - id: g_batt         # battery level in % (-1 = no reading yet -> show "-")
    type: int
    restore_value: no
    initial_value: '-1'
  - id: g_charging     # true = charging/on USB (voltage heuristic - no STAT pin on GPIO)
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_v_med        # last median VCC_OUT voltage (to detect rising = charging)
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: g_chg_anim     # frame of the battery "filling" animation while charging (0..4)
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_night_from
    type: int
    restore_value: yes
    initial_value: '22'
  - id: g_night_to
    type: int
    restore_value: yes
    initial_value: '7'
  - id: g_blank_idx
    type: int
    restore_value: yes
    initial_value: '0'
  - id: g_idle_ticks
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_disp_off
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_want_off
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_wake_consume
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_sub_idx      # selection inside a settings submenu (Home/Assistant/Ring/System/Demo/Weather)
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_beep_ww      # beep on wake word detection (Sound category)
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: g_hold_talk    # press-and-hold the screen to start the assistant
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: g_tz_posix     # resolved POSIX timezone captured at boot (to re-apply if runtime resets it to UTC)
    type: std::string
    restore_value: no
  - id: g_set_idx      # selected item in the settings list (roller)
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_ww_on        # wake word enabled
    type: bool
    restore_value: no
    initial_value: 'true'
  # --- LED ring (WS2812): reaction state + snapshot of HA state to restore ---
  - id: g_ring_cur     # currently shown reaction: 0=HA state 1=alarm 2=assistant 3=timer
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_ring_override  # true = ring overridden by a reaction (HA-state snapshot already taken)
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_ring_was_on  # snapshot: was the ring on in HA before the reaction
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_ring_r       # snapshot of HA color/brightness (0..1)
    type: float
    restore_value: no
    initial_value: '1.0'
  - id: g_ring_g
    type: float
    restore_value: no
    initial_value: '1.0'
  - id: g_ring_b
    type: float
    restore_value: no
    initial_value: '1.0'
  - id: g_ring_bri
    type: float
    restore_value: no
    initial_value: '1.0'
  - id: g_va_phase    # assistant phase for the ring: 1=listening 2=thinking 3=speaking
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_vol         # last volume from HA (0..1) - for the ring volume bar
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: g_vol_show    # true = show volume on the ring (briefly, ~2 s after turning)
    type: bool
    restore_value: no
    initial_value: 'false'
  # --- Ring: which reactions are enabled (persistent; editable in Settings -> Ring) ---
  - id: g_ring_va      # react to the assistant (listening/thinking/speaking)
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: g_ring_timer   # show the timer countdown ring
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: g_ring_alarm   # flash on the timer alarm
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: g_ring_vol_en  # show the volume bar while turning
    type: bool
    restore_value: yes
    initial_value: 'true'

  # --- Modular carousel contract: shared globals so the core never names a screen's symbols ---
  - id: g_order
    type: int[16]
    restore_value: no
  - id: g_order_n
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_nav_req
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_nav_anim
    type: int
    restore_value: no
    initial_value: '1'
  - id: g_knob_capture
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_knob_delta
    type: int
    restore_value: no
    initial_value: '0'
  # --- Dynamic settings registry: each screen package can add its own entries ---
  - id: g_set_items      # g_mode each settings row opens
    type: int[12]
    restore_value: no
  - id: g_set_n
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_set_labels     # newline-joined roller labels, applied at boot
    type: std::string
    restore_value: no
  - id: g_present        # which screens registered (by base id); carousel is built from screen_order
    type: bool[16]
    restore_value: no
  - id: g_tap_seq        # bumped on every normal-mode tap; screens watch it to react (shared infra)
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_boot          # boot splash active (gates input until it hands off to the clock)
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: g_boot_t        # boot splash tick counter
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_tile1_glyph
    type: std::string
    restore_value: no
  - id: g_tile2_glyph
    type: std::string
    restore_value: no
  - id: g_tile3_glyph
    type: std::string
    restore_value: no
  - id: g_tile4_glyph
    type: std::string
    restore_value: no
  - id: g_wgrp_labels    # Widgets submenu: group names, appended by each screen package at boot
    type: std::string
    restore_value: no
  - id: g_wopt_n         # generic per-screen settings registry (filled by screen packages at boot)
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_wopt_group     # which Widgets group each option belongs to
    type: int[16]
    restore_value: no
  - id: g_wopt_label     # option label
    type: std::string[16]
    restore_value: no
  - id: g_wopt_kind      # 0 = toggle, 1 = action (confirm)
    type: int[16]
    restore_value: no
  - id: g_wopt_ptr       # &bool for toggles / &flag for actions
    type: "std::array<bool*, 16>"
    restore_value: no
  - id: g_wopt_idx       # selection within the current group's options
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_wcur_opts      # registry indices of the current group's options
    type: int[16]
    restore_value: no
  - id: g_wcur_n
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_wcur_name      # current group name (header)
    type: std::string
    restore_value: no
  - id: g_factory_reset  # one-shot (persists a reboot); game packages clear their scores when set
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: g_wgrp_n
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_wgrp_idx
    type: int
    restore_value: no
    initial_value: '0'

# Shows the volume arc for ~2 s while turning the knob, then hides it (mode: restart)
script:
  # Carousel router: show the screen for g_base. Core pages directly; optional screens
  # (cars/space) show themselves via g_nav_req. g_nav_anim: 0=left 1=right 2=top 3=bottom.
  - id: show_base
    then:
      - if: { condition: { lambda: 'return id(g_base)==0 && id(g_nav_anim)==0;' }, then: [lvgl.page.show: { id: page_home,   animation: move_left,   time: 250ms }] }
      - if: { condition: { lambda: 'return id(g_base)==0 && id(g_nav_anim)==1;' }, then: [lvgl.page.show: { id: page_home,   animation: move_right,  time: 250ms }] }
      - if: { condition: { lambda: 'return id(g_base)==0 && id(g_nav_anim)==2;' }, then: [lvgl.page.show: { id: page_home,   animation: move_top,    time: 250ms }] }
      - if: { condition: { lambda: 'return id(g_base)==0 && id(g_nav_anim)==3;' }, then: [lvgl.page.show: { id: page_home,   animation: move_bottom, time: 250ms }] }
      - if: { condition: { lambda: 'return id(g_base)==1;' }, then: [ lambda: 'id(g_nav_req) = true;' ] }
      - if: { condition: { lambda: 'return id(g_base)==2 && id(g_nav_anim)==0;' }, then: [lvgl.page.show: { id: page_timer,  animation: move_left,   time: 250ms }] }
      - if: { condition: { lambda: 'return id(g_base)==2 && id(g_nav_anim)==1;' }, then: [lvgl.page.show: { id: page_timer,  animation: move_right,  time: 250ms }] }
      - if: { condition: { lambda: 'return id(g_base)==2 && id(g_nav_anim)==2;' }, then: [lvgl.page.show: { id: page_timer,  animation: move_top,    time: 250ms }] }
      - if: { condition: { lambda: 'return id(g_base)==2 && id(g_nav_anim)==3;' }, then: [lvgl.page.show: { id: page_timer,  animation: move_bottom, time: 250ms }] }
      - if: { condition: { lambda: 'return id(g_base) >= 3;' }, then: [ lambda: 'id(g_nav_req) = true;' ] }
  # Apply the dynamically-built settings list to the roller (called once at boot).
  - id: settings_build
    then:
      - lambda: 'lv_roller_set_options(id(settings_roller)->obj, id(g_set_labels).c_str(), LV_ROLLER_MODE_NORMAL);'
      - lambda: 'lv_roller_set_options(id(wid_roller)->obj, id(g_wgrp_labels).c_str(), LV_ROLLER_MODE_NORMAL);'
  # Home watchface: show the selected face (0 = Classic, 1 = Neon). Classic restores its
  # weather/room widgets via disp_apply (they obey the Display settings); Neon owns its own.
  - id: face_apply
    then:
      - if:
          condition: { lambda: 'return id(g_watchface) == 1;' }
          then:
            - lvgl.widget.hide: lbl_clock
            - lvgl.widget.hide: lbl_date
            - lvgl.widget.hide: lbl_batt
            - lvgl.widget.hide: lbl_wx_ic
            - lvgl.widget.hide: lbl_wx_val
            - lvgl.widget.hide: lbl_ct_ic
            - lvgl.widget.hide: lbl_ct_val
            - lvgl.widget.hide: lbl_ch_ic
            - lvgl.widget.hide: lbl_ch_val
            - lvgl.widget.show: face_neon
            - script.execute: neon_render
          else:
            - lvgl.widget.hide: face_neon
            - lvgl.widget.show: lbl_clock
            - lvgl.widget.show: lbl_date
            - lvgl.widget.show: lbl_batt
            - script.execute: disp_apply
  # Populate the Neon face widgets (called on switch + every second while it is the active face).
  - id: neon_render
    then:
      - lvgl.label.update: { id: nf_hh, text: !lambda 'return id(ha_time).now().is_valid() ? id(ha_time).now().strftime("%H") : std::string("00");' }
      - lvgl.label.update: { id: nf_mm, text: !lambda 'return id(ha_time).now().is_valid() ? id(ha_time).now().strftime("%M") : std::string("00");' }
      - lvgl.label.update: { id: nf_wx_ic, text: !lambda 'return id(g_nf_glyph).empty() ? std::string("󰖕") : id(g_nf_glyph);' }
      - lvgl.label.update: { id: nf_wx_cond, text: !lambda 'return id(g_nf_cond);' }
      - lvgl.label.update:
          id: nf_wx_temp
          text: !lambda |-
            if (!id(wx_temp).has_state()) return std::string("--°");
            char b[10]; snprintf(b, sizeof(b), "%d°", (int) roundf(id(wx_temp).state)); return std::string(b);
      - lvgl.label.update:
          id: nf_date
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("");
            static const char* d[8] = {"","Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
            std::string day = (t.day_of_week >= 1 && t.day_of_week <= 7) ? std::string(d[t.day_of_week]) : std::string("");
            return t.strftime("%d %b") + "   " + day;
      - lvgl.label.update:
          id: nf_stats
          text: !lambda |-
            char b[48]; std::string out;
            if (id(room_temp).has_state()) { snprintf(b, sizeof(b), "%.1f\xC2\xB0", id(room_temp).state); out += b; }
            if (id(room_hum).has_state()) { snprintf(b, sizeof(b), "   %d%%", (int) roundf(id(room_hum).state)); out += b; }
            if (id(g_batt) >= 0) { snprintf(b, sizeof(b), "   %s%d%%", id(g_charging) ? "+" : "", id(g_batt)); out += b; }
            return out;
  # Rebuild the Home settings roller so its 3rd line shows the current watchface name.
  - id: home_roller_build
    then:
      - lambda: |-
          static const char* NAMES[2] = {"Classic", "Neon"};
          int wf = id(g_watchface); if (wf < 0 || wf > 1) wf = 0;
          std::string opts = std::string("Weather\nClimate\nWatchface: ") + NAMES[wf];
          lv_roller_set_options(id(home_roller)->obj, opts.c_str(), LV_ROLLER_MODE_NORMAL);
  # Draws the battery indicator on the home screen. Charging: lightning bolt + green +
  # "filling" animation (icon cycles empty→full). On battery: static level icon.
  - id: batt_render
    then:
      - lvgl.label.update:
          id: lbl_batt
          text: !lambda |-
            int p = id(g_batt);
            if (p < 0) return std::string("");               // no reading yet (after boot) - empty instead of tofu (montserrat has no "-")
            if (id(g_charging)) {                                 // charging: lightning bolt + animation, WITHOUT % (voltage reads high)
              const char* fr[5] = {"","","","",""};
              return std::string("") + fr[id(g_chg_anim) % 5];
            }
            std::string ic = p > 87 ? "" : p > 62 ? "" : p > 37 ? "" : p > 12 ? "" : "";
            char bf[12]; snprintf(bf, sizeof(bf), " %d%%", p);
            return ic + bf;
      - if:
          condition:
            lambda: 'return id(g_charging);'
          then:
            - lvgl.label.update: { id: lbl_batt, text_color: 0x35c759 }
          else:
            - lvgl.label.update: { id: lbl_batt, text_color: 0x6f9a92 }
  - id: flash_volume
    mode: restart
    then:
      - lvgl.widget.show: vol_dim
      - lvgl.widget.show: vol_arc
      - lvgl.widget.show: vol_label
      - lambda: 'id(g_vol_shown) = true;'
      - delay: 2000ms
      - lvgl.widget.hide: vol_dim
      - lvgl.widget.hide: vol_arc
      - lvgl.widget.hide: vol_label
      - lambda: 'id(g_vol_shown) = false;'
  # Immediately hides the volume overlay (after tapping it) - consumes the click
  - id: vol_hide_now
    then:
      - script.stop: flash_volume
      - lvgl.widget.hide: vol_dim
      - lvgl.widget.hide: vol_arc
      - lvgl.widget.hide: vol_label
      - lambda: 'id(g_vol_shown) = false;'
  # Assistant overlay (dim + frame + text) - always on top
  - id: va_show
    then:
      - lvgl.widget.show: va_dim
      - lvgl.widget.show: va_frame
      - lvgl.widget.show: va_text
  - id: va_hide
    then:
      - lvgl.widget.hide: va_dim
      - lvgl.widget.hide: va_frame
      - lvgl.widget.hide: va_text
  # Draws the menu/timer/alarm overlay per g_mode (hidden in normal mode and during VA)
  - id: ui_render
    then:
      # === A: animated transitions: BASE(0) / page_mode(menu,timer,alarm,sub) / page_settings(5) / page_controls(10) ===
      # g_cur_page: 0=base 1=page_mode 2=page_settings 3=page_controls. Animation only when the page changes.
      - if:
          condition:
            lambda: 'int w=(id(g_mode)==0)?0:(id(g_mode)==5)?2:(id(g_mode)==10)?3:1; return w != id(g_cur_page);'
          then:
            - if:   # -> BASE: return per g_base (0=clock 1=player 2=timer); direction per g_exit_anim (0=right 1=down 2=up)
                condition: { lambda: 'return id(g_mode) == 0;' }
                then:
                  - lambda: |-
                      // g_exit_anim 0=right 1=down 2=up  ->  g_nav_anim 1=right 3=bottom 2=top
                      id(g_nav_anim) = (id(g_exit_anim)==1) ? 3 : (id(g_exit_anim)==2) ? 2 : 1;
                      id(g_exit_anim) = 0;
                  - script.execute: show_base
            - if:   # -> SETTINGS (list): from base "from top" (swipe ↓), from a sub-screen "back" (to the right)
                condition: { lambda: 'return id(g_mode) == 5;' }
                then:
                  - if:
                      condition: { lambda: 'return id(g_cur_page) == 0;' }
                      then: [lvgl.page.show: { id: page_settings, animation: move_bottom, time: 250ms }]
                      else: [lvgl.page.show: { id: page_settings, animation: move_right, time: 250ms }]
            - if:   # -> CONTROLS (tiles, swipe ↑ from base = "from bottom")
                condition: { lambda: 'return id(g_mode) == 10;' }
                then: [lvgl.page.show: { id: page_controls, animation: move_top, time: 250ms }]
            - if:   # -> MODE: from settings "deeper" (to the left), menu from base "from bottom", rest fade
                condition: { lambda: 'return id(g_mode) != 0 && id(g_mode) != 5 && id(g_mode) != 10;' }
                then:
                  - if:
                      condition: { lambda: 'return id(g_cur_page) == 2;' }
                      then: [lvgl.page.show: { id: page_mode, animation: move_left, time: 250ms }]
                      else:
                        - if:
                            condition: { lambda: 'return id(g_mode) == 1;' }
                            then: [lvgl.page.show: { id: page_mode, animation: move_top, time: 250ms }]
                            else: [lvgl.page.show: { id: page_mode, animation: fade_in, time: 250ms }]
            - lambda: 'id(g_cur_page) = (id(g_mode)==0)?0:(id(g_mode)==5)?2:(id(g_mode)==10)?3:1;'
      - if:
          condition:
            lambda: 'return id(g_mode) == 0 || id(g_va_active);'
          then:
            - lvgl.widget.hide: ui_dim
            - lvgl.widget.hide: ui_head_bg
            - lvgl.widget.hide: ui_head
            - lvgl.widget.hide: ui_big
            - lvgl.widget.hide: ui_sub
            - lvgl.widget.hide: ui_bar
            - lvgl.widget.hide: disp_roller
            - lvgl.widget.hide: disp_lbl
            - lvgl.widget.hide: disp_switch
            - lvgl.widget.hide: asys_roller
            - lvgl.widget.hide: sys_roller
            - lvgl.widget.hide: ring_roller
            - lvgl.widget.hide: home_roller
            - lvgl.widget.hide: wid_roller
            - lvgl.widget.hide: wopt_roller
          else:
            - lvgl.widget.show: ui_dim
            - lvgl.widget.show: ui_head_bg
            - lvgl.widget.show: ui_head
            - if:   # subtext ONLY on Info (IP/version) - the rest without instructions
