  # Battery: ADC on GPIO6 (BAT_ADC, ~10k/10k divider -> x2). PIN/RATIO to verify live.
  - platform: adc
    pin: GPIO6
    id: batt_volt
    name: "Battery voltage"
    attenuation: 12db
    update_interval: 1s
    samples: 64                  # hardware oversampling: 64 readings/measurement averaged
                                 # -> cuts ripple from the ETA6003 converter (no capacitor on BAT_ADC)
    filters:
      - multiply: 2.0
      # Reject values physically impossible for Li-ion (that's switching ripple, not voltage):
      - lambda: 'return (x >= 3.20f && x <= 4.30f) ? x : NAN;'
      # On the cleaned signal: moving average, output every ~10 s
      - sliding_window_moving_average:
          window_size: 20
          send_every: 10
          send_first_at: 5
    on_value:
      - lambda: |-
          // x = VCC_OUT (median, after ×2) = system rail ≈ battery voltage UNDER load.
          float v = x;
          // Voltage→% curve CALIBRATED on a real discharge (under load):
          // start ~4.10 (≈90%), nearly linear drop, brownout ~3.20 V. Range 3.20-4.15.
          static const float vt[] = {3.20f,3.25f,3.39f,3.57f,3.74f,3.84f,4.10f};
          static const float st[] = {0.f,  4.f,  20.f, 40.f, 60.f, 80.f, 100.f};
          const int n = 7;
          float pct;
          if (v <= vt[0]) pct = 0.f;
          else if (v >= vt[n-1]) pct = 100.f;
          else { pct = 0.f; for (int i = 0; i < n-1; i++) { if (v >= vt[i] && v < vt[i+1]) { pct = st[i] + (v - vt[i]) / (vt[i+1] - vt[i]) * (st[i+1] - st[i]); break; } } }
          int p = (int) roundf(pct);
          if (p < 0) p = 0; if (p > 100) p = 100;
          id(g_batt) = p;
          // --- Charging detection (no STAT pin on GPIO -> voltage heuristic) ---
          // The puck constantly draws current (backlight+ESP+audio); only USB keeps the voltage high.
          float prev = id(g_v_med);
          id(g_v_med) = v;
          bool rising = (prev > 0.1f) && (v - prev > 0.010f);  // voltage rising = charging
          bool high   = (v >= 4.13f);                          // on battery under load max ~4.10 -> only USB holds ≥4.13
          bool low    = (v < 4.05f);                           // clearly on battery
          if (high || rising) id(g_charging) = true;
          else if (low)       id(g_charging) = false;
          // 4.05-4.13 zone without a rise: keep the previous state (hysteresis, no flicker)
      - script.execute: batt_render

# Push-to-talk: screen TAP (handled in touchscreen: on_release). Swipe = next/prev.
# Eventually the wake word (micro_wake_word) will be better.
binary_sensor:
  # ── KNOB: this "encoder" is NOT classic quadrature. Confirmed by logs:
  #    direction is encoded by WHICH pin pulses (not A/B phase):
  #      • LEFT  → GPIO2 pulses  → quieter
  #      • RIGHT → GPIO1 pulses  → louder
  #    Each detent = one clean LOW pulse (sequence 0101...), zero bounce.
  #    That's why rotary_encoder (expects interleaved A/B) counted zero.
  #    So we read two independent pulses: inverted+pullup → detent = "on_press".
  - platform: gpio
    name: "Knob left"
    id: knob_left
    pin:
      number: GPIO2
      inverted: true
      mode:
        input: true
        pullup: true
    on_press:
      - if:
          condition:
            lambda: 'return id(g_mode) == 0 && (id(g_knob_capture) || (id(g_base) == 2 && !id(g_timer_active)));'
          then:
            - if:
                condition: { lambda: 'return id(g_knob_capture);' }
                then: [ lambda: 'id(g_knob_delta)--;' ]
                else:
                  - lambda: 'id(g_set_min)--; if (id(g_set_min) < 1) id(g_set_min) = 1;'
                  - script.execute: timer_render
          else:
            - if:
                condition:
                  lambda: 'return id(g_mode) == 5 || id(g_mode) == 11 || (id(g_mode) >= 12 && id(g_mode) <= 17) || id(g_mode) == 30;'
                then:
                  - lambda: |-
                      if (id(g_mode) == 11) { if (id(g_disp_idx) > 0) id(g_disp_idx)--; }
                      else if (id(g_mode) == 5) { if (id(g_set_idx) > 0) id(g_set_idx)--; }
                      else if (id(g_mode) == 17) { if (id(g_wgrp_idx) > 0) id(g_wgrp_idx)--; }
                      else if (id(g_mode) == 30) { if (id(g_wopt_idx) > 0) id(g_wopt_idx)--; }
                      else { if (id(g_sub_idx) > 0) id(g_sub_idx)--; }
                  - script.execute: ui_render
                else:
                  - if:
                      condition:
                        lambda: 'return id(g_mode) == 6;'
                      then:
                        - lambda: 'id(g_bright) -= 10; if (id(g_bright) < 10) id(g_bright) = 10;'
                        - light.turn_on:
                            id: backlight_light
                            brightness: !lambda 'return id(g_bright) / 100.0f;'
                        - script.execute: ui_render
                      else:
                        - if:
                            condition: { lambda: 'return id(g_mode) == 24 || id(g_mode) == 25 || id(g_mode) == 26;' }
                            then:
                              - lambda: |-
                                  if (id(g_mode) == 24) { if (id(g_blank_idx) > 0) id(g_blank_idx)--; }
                                  else if (id(g_mode) == 25) { id(g_night_from)--; if (id(g_night_from) < 0) id(g_night_from) = 23; }
                                  else { id(g_night_to)--; if (id(g_night_to) < 0) id(g_night_to) = 23; }
                              - script.execute: ui_render
                            else:
                              - media_player.volume_down:
                                  id: media_player_speaker
                              - script.execute: flash_volume
                              - script.execute: ring_vol_flash
  - platform: gpio
    name: "Knob right"
    id: knob_right
    pin:
      number: GPIO1
      inverted: true
      mode:
        input: true
        pullup: true
    on_press:
      - if:
          condition:
            lambda: 'return id(g_mode) == 0 && (id(g_knob_capture) || (id(g_base) == 2 && !id(g_timer_active)));'
          then:
            - if:
                condition: { lambda: 'return id(g_knob_capture);' }
                then: [ lambda: 'id(g_knob_delta)++;' ]
                else:
                  - lambda: 'id(g_set_min)++; if (id(g_set_min) > 180) id(g_set_min) = 180;'
                  - script.execute: timer_render
          else:
            - if:
                condition:
                  lambda: 'return id(g_mode) == 5 || id(g_mode) == 11 || (id(g_mode) >= 12 && id(g_mode) <= 17) || id(g_mode) == 30;'
                then:
                  - lambda: |-
                      if (id(g_mode) == 11) { if (id(g_disp_idx) < 4) id(g_disp_idx)++; }
                      else if (id(g_mode) == 5) { if (id(g_set_idx) < id(g_set_n) - 1) id(g_set_idx)++; }
                      else if (id(g_mode) == 17) { if (id(g_wgrp_idx) < id(g_wgrp_n) - 1) id(g_wgrp_idx)++; }
                      else if (id(g_mode) == 30) { if (id(g_wopt_idx) < id(g_wcur_n) - 1) id(g_wopt_idx)++; }
                      else { int mx = (id(g_mode) == 15) ? 3 : (id(g_mode) == 13) ? 2 : (id(g_mode) == 16) ? 3 : (id(g_mode) == 12) ? 2 : 0; if (id(g_sub_idx) < mx) id(g_sub_idx)++; }
                  - script.execute: ui_render
                else:
                  - if:
                      condition:
                        lambda: 'return id(g_mode) == 6;'
                      then:
                        - lambda: 'id(g_bright) += 10; if (id(g_bright) > 100) id(g_bright) = 100;'
                        - light.turn_on:
                            id: backlight_light
                            brightness: !lambda 'return id(g_bright) / 100.0f;'
                        - script.execute: ui_render
                      else:
                        - if:
                            condition: { lambda: 'return id(g_mode) == 24 || id(g_mode) == 25 || id(g_mode) == 26;' }
                            then:
                              - lambda: |-
                                  if (id(g_mode) == 24) { if (id(g_blank_idx) < 4) id(g_blank_idx)++; }
                                  else if (id(g_mode) == 25) { id(g_night_from)++; if (id(g_night_from) > 23) id(g_night_from) = 0; }
                                  else { id(g_night_to)++; if (id(g_night_to) > 23) id(g_night_to) = 0; }
                              - script.execute: ui_render
                            else:
                              - media_player.volume_up:
                                  id: media_player_speaker
                              - script.execute: flash_volume
                              - script.execute: ring_vol_flash

###############################################################################
# DISPLAY (QSPI ST77916) + BACKLIGHT + TOUCH (CST816)
# Pins: SCK=11 CS=12 D0=13 D1=14 D2=15 D3=16 RST=17 BLK=21
#       TOUCH SDA=9 SCL=10 INT=7 RST=8
###############################################################################
spi:
  id: display_qspi
  type: quad
  clk_pin: 11
  data_pins: [13, 14, 15, 16]

i2c:
  sda: 9
  scl: 10
  id: touchscreen_bus

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    name: "Backlight"
    id: backlight_light
    restore_mode: ALWAYS_ON
  # LED ring on the knob: WS2812, 13 LEDs, GRB, data=GPIO0.
  # GPIO0 is also the BOOT/strapping pin - it works as a WS2812 output after boot
  # (ESPHome may warn about a strapping pin; that's normal on this board).
  # Controllable from HA (on/off, color, brightness, effects). Reactions (assistant/timer/alarm)
  # temporarily override the ring by priority and return to the HA state - see the ring_update script.
  - platform: esp32_rmt_led_strip
    id: ring_light
    name: "${friendly_name} Ring"
    pin: GPIO0
    num_leds: 13
    rgb_order: GRB
    chipset: WS2812
    rmt_symbols: 128
    use_dma: true                     # feed RMT via DMA (no CPU interrupts) so heavy display work
                                      # (screen transitions) can't disrupt the WS2812 timing -> no stray
                                      # red/white pixel flashes. ESP32-S3 supports RMT DMA.
    default_transition_length: 0s     # no fade - reactions should be instant
    restore_mode: RESTORE_DEFAULT_OFF
    effects:
      - addressable_rainbow:
          name: "Rainbow"
      - pulse:
          name: "Pulse"
      - addressable_lambda:    # Boot splash: an azure comet (bright head + fading tail) circles the ring
          name: "Boot"
          update_interval: 40ms
          lambda: |-
            int n = it.size();
            float pos = fmodf(millis() / 55.0f, (float) n);   // head position, ~1 rev / 0.7s
            for (int i = 0; i < n; i++) {
              float d = pos - i;                              // how far this LED is BEHIND the head
              while (d < 0) d += n;
              while (d >= n) d -= n;
              float b = (d < 6.0f) ? (1.0f - d / 6.0f) : 0.0f;
              b = b * b;                                      // ease -> tight bright head, soft tail
              it[i] = Color((uint8_t)(2 + 58 * b), (uint8_t)(6 + 174 * b), (uint8_t)(16 + 239 * b));
            }
      # --- Reaction effects (driven by ring_update, read state globals) ---
      - addressable_lambda:    # Assistant LISTENING: a comet (cyan) circles the ring
          name: "Listen"
          update_interval: 50ms
          lambda: |-
            int n = it.size();
            float pos = fmodf(millis() / 60.0f, (float) n);
            for (int i = 0; i < n; i++) {
              float d = fabsf(i - pos);
              if (d > n / 2.0f) d = n - d;          // distance around the circle
              float b = (d < 4.0f) ? (1.0f - d / 4.0f) : 0.0f;
              it[i] = Color(0, (uint8_t)(210 * b), (uint8_t)(230 * b));
            }
      - addressable_lambda:    # Assistant THINKING: fast spinner (purple, 3 LEDs)
          name: "Think"
          update_interval: 45ms
          lambda: |-
            int n = it.size();
            int head = (int)(millis() / 45) % n;
            for (int i = 0; i < n; i++) it[i] = Color(0, 0, 0);
            for (int k = 0; k < 3; k++) {
              int idx = (head + k) % n;
              float b = 1.0f - k * 0.33f;
              it[idx] = Color((uint8_t)(150 * b), (uint8_t)(40 * b), (uint8_t)(230 * b));
            }
      - addressable_lambda:    # Assistant SPEAKING: smooth wave (teal-green) running around
          name: "Speak"
          update_interval: 50ms
          lambda: |-
            int n = it.size();
            float t = millis() / 120.0f;
            for (int i = 0; i < n; i++) {
              float w = 0.5f + 0.5f * sinf((float) i / n * 6.2831853f * 2.0f - t);
              it[i] = Color((uint8_t)(20 * w), (uint8_t)(220 * w), (uint8_t)(120 * w));
            }
      - addressable_lambda:    # Volume: level bar (green->red) for ~2 s while turning
          name: "Volume"
          update_interval: 60ms
          lambda: |-
            int n = it.size();
            float v = id(g_vol);
            if (v < 0) v = 0;
            if (v > 1) v = 1;
            int lit = (int) roundf(v * n);
            for (int i = 0; i < n; i++) {
              if (i < lit) it[i] = Color((uint8_t)(40 + 215 * v), (uint8_t)(200 * (1.0f - v)), 0);
              else it[i] = Color(6, 6, 6);
            }
      - addressable_lambda:    # Alarm: pulsing red
          name: "Alarm"
          update_interval: 280ms
          lambda: |-
            static bool on = false;
            on = !on;
            it.all() = on ? Color(255, 0, 0) : Color(20, 0, 0);
      - addressable_lambda:    # Timer: countdown ring (green -> red, shrinks over time)
          name: "Timer"
          update_interval: 200ms
          lambda: |-
            int n = it.size();
            int tot = id(g_timer_total);
            float frac = (tot > 0) ? (float) id(g_timer_secs) / tot : 0.0f;
            if (frac < 0) frac = 0;
            if (frac > 1) frac = 1;
            int lit = (int) ceilf(frac * n);
            // red from the start (like the on-screen timer ring); pause = dimmed
            uint8_t dim = id(g_timer_paused) ? 3 : 1;
            for (int i = 0; i < n; i++) {
              it[i] = (i < lit) ? Color(255 / dim, 59 / dim, 48 / dim) : Color(0, 0, 0);
            }

button:
  - platform: restart
    id: btn_restart
    name: "Restart"

touchscreen:
  platform: cst816
  id: my_touchscreen
  interrupt_pin: GPIO7
  reset_pin: GPIO8
  display: main_display
  on_touch:
    - lambda: |-
        id(g_x0) = (int) touch.x;
        id(g_y0) = (int) touch.y;
        id(g_t0) = millis();
        id(g_dx) = 0;
        id(g_dy) = 0;
        id(g_idle_ticks) = 0;
    - if:
        condition: { lambda: 'return id(g_disp_off);' }
        then:
          - light.turn_on: { id: backlight_light, brightness: !lambda 'return id(g_bright) / 100.0f;' }
          - lambda: 'id(g_disp_off) = false; id(g_wake_consume) = true;'
  on_update:
    - lambda: |-
        if (!touches.empty()) {
          id(g_dx) = (int) touches[0].x - id(g_x0);
          id(g_dy) = (int) touches[0].y - id(g_y0);
        }
  on_release:
    # Gesture classification + mode snapshot (routing by g_mode0, so one gesture doesn't cascade)
    - lambda: |-
        if (id(g_boot)) { id(g_gesture) = -1; id(g_mode0) = 0; return; }   // ignore input during the boot splash
        int dx = id(g_dx), dy = id(g_dy);
        uint32_t held = millis() - id(g_t0);
        int g;
        if (abs(dx) > 50 && abs(dx) > abs(dy)) g = (dx < 0) ? 2 : 3;        // 2=left 3=right
        else if (abs(dy) > 50 && abs(dy) > abs(dx)) g = (dy < 0) ? 4 : 5;   // 4=up 5=down
        else if (abs(dx) < 16 && abs(dy) < 16) g = (held >= 500) ? 1 : 0;   // 1=hold 0=tap
        else g = -1;
        if (id(g_wake_consume)) { g = -1; id(g_wake_consume) = false; }
        id(g_idle_ticks) = 0;
        id(g_gesture) = g;
        id(g_mode0) = id(g_mode);
    # === Volume overlay on top: ANY gesture (tap/swipe/hold) hides it and is CONSUMED ===
    - if:
        condition:
          lambda: 'return id(g_vol_shown) && id(g_gesture) >= 0;'
        then:
          - script.execute: vol_hide_now
          - lambda: 'id(g_gesture) = -1;'   # neutralize the gesture -> no mode will handle it
    # === NORMAL MODE ===
    - if:
        condition:
          lambda: 'return id(g_mode0) == 0;'
        then:
          - if:   # tap -> bump a generic signal so the active screen can react (e.g. demo)
              condition: { lambda: 'return id(g_gesture) == 0;' }
              then: [ lambda: 'id(g_tap_seq)++;' ]
          - if:   # swipe up -> controls (light tiles)
              condition:
                lambda: 'return id(g_gesture) == 4;'
              then:
                - lambda: 'id(g_mode) = 10;'
                - script.execute: ui_render
          - if:   # swipe down -> settings (list)
              condition:
                lambda: 'return id(g_gesture) == 5;'
              then:
                - lambda: 'id(g_mode) = 5; id(g_set_idx) = 0;'
                - script.execute: ui_render
          # Horizontal carousel: swipe steps through g_order (built from screen_order at boot),
          # wrapping around. Each screen shows itself via show_base / its nav handler.
          - if:   # swipe ← -> next
              condition: { lambda: 'return id(g_gesture) == 2;' }
              then:
                - lambda: |-
                    int i = 0; for (; i < id(g_order_n); i++) if (id(g_order)[i] == id(g_base)) break;
                    if (i >= id(g_order_n)) i = 0;
                    id(g_base) = id(g_order)[(i + 1) % id(g_order_n)];
                    id(g_nav_anim) = 0;
                    id(g_knob_capture) = false; id(g_knob_delta) = 0;
                - script.execute: show_base
          - if:   # swipe → -> previous
              condition: { lambda: 'return id(g_gesture) == 3;' }
              then:
                - lambda: |-
                    int i = 0; for (; i < id(g_order_n); i++) if (id(g_order)[i] == id(g_base)) break;
                    if (i >= id(g_order_n)) i = 0;
                    id(g_base) = id(g_order)[(i - 1 + id(g_order_n)) % id(g_order_n)];
                    id(g_nav_anim) = 1;
                    id(g_knob_capture) = false; id(g_knob_delta) = 0;
                - script.execute: show_base
          # game: START/Play buttons on the game screen handle start/restart (not a global tap)
          # prev/play/next are handled by the buttons on the player screen (transport)
          - if:   # hold -> start the assistant (works on every screen; toggle in Settings > Assistant)
              condition:
                lambda: 'return id(g_gesture) == 1 && id(g_hold_talk);'
              then:
                - if:
                    condition: voice_assistant.is_running
                    then: [voice_assistant.stop: {}]
                    else: [voice_assistant.start: {}]
    # === MENU ===
    - if:
        condition:
          lambda: 'return id(g_mode0) == 1;'
        then:
          - if:   # tap -> open timer (the only item)
              condition:
                lambda: 'return id(g_gesture) == 0;'
              then:
                - lambda: 'id(g_mode) = 2; id(g_set_min) = 5;'
                - script.execute: ui_render
          - if:   # hold / swipe down / swipe right -> close menu (back)
              condition:
                lambda: 'return id(g_gesture) == 1 || id(g_gesture) == 5 || id(g_gesture) == 3;'
              then:
                - lambda: 'id(g_mode) = 0;'
                - script.execute: ui_render
    # === TIMER_SET ===
    - if:
        condition:
          lambda: 'return id(g_mode0) == 2;'
        then:
          - if:   # tap -> start
              condition:
                lambda: 'return id(g_gesture) == 0;'
              then:
                - script.execute: timer_start_local
          - if:   # hold / swipe right -> cancel (back)
              condition:
                lambda: 'return id(g_gesture) == 1 || id(g_gesture) == 3;'
              then:
                - script.execute: timer_cancel
    # === TIMER_RUN ===
    - if:
        condition:
          lambda: 'return id(g_mode0) == 3;'
        then:
          - if:
              condition:
                lambda: 'return id(g_gesture) == 0 || id(g_gesture) == 1 || id(g_gesture) == 3;'
              then:
                - script.execute: timer_cancel
    # === ALARM ===
    - if:
        condition:
          lambda: 'return id(g_mode0) == 4;'
        then:
          - if:
              condition:
                lambda: 'return id(g_gesture) == 0 || id(g_gesture) == 1 || id(g_gesture) == 3;'
              then:
                - script.execute: alarm_stop
    # === CONTROLS (tiles) === tap=tile buttons; swipe ↓/→/hold = back
    - if:
        condition:
          lambda: 'return id(g_mode0) == 10;'
        then:
          - if:   # swipe ↓ -> close with a "downward slide"
              condition: { lambda: 'return id(g_gesture) == 5;' }
              then:
                - lambda: 'id(g_exit_anim) = 1; id(g_mode) = 0;'
                - script.execute: ui_render
          - if:   # back (right / hold) -> close "to the right"
              condition: { lambda: 'return id(g_gesture) == 1 || id(g_gesture) == 3;' }
              then:
                - lambda: 'id(g_exit_anim) = 0; id(g_mode) = 0;'
                - script.execute: ui_render
    # === SETTINGS (list) === knob=scroll; tap=enter; right/hold=back
    - if:
        condition:
          lambda: 'return id(g_mode0) == 5;'
        then:
          - if:   # tap -> enter the selected item
              condition:
                lambda: 'return id(g_gesture) == 0;'
              then:
                - lambda: 'id(g_mode) = id(g_set_items)[id(g_set_idx)]; id(g_disp_idx) = 0; id(g_sub_idx) = 0; id(g_wgrp_idx) = 0;'
                - script.execute: ui_render
          - if:   # back: swipe right / hold -> "to the right"
              condition:
                lambda: 'return id(g_gesture) == 3 || id(g_gesture) == 1;'
              then:
                - lambda: 'id(g_exit_anim) = 0; id(g_mode) = 0;'
                - script.execute: ui_render
          - if:   # swipe ↑ -> close "upward" (reverse of settings entering from the bottom)
              condition:
                lambda: 'return id(g_gesture) == 4;'
              then:
                - lambda: 'id(g_exit_anim) = 2; id(g_mode) = 0;'
                - script.execute: ui_render
    # === DISPLAY (11) === knob=scroll; tap=action; right/hold=back to settings
    - if:
        condition:
          lambda: 'return id(g_mode0) == 11;'
        then:
          - if:   # tap -> action per the selected item
              condition: { lambda: 'return id(g_gesture) == 0;' }
              then:
                - if: { condition: { lambda: 'return id(g_disp_idx) == 0;' }, then: [ lambda: 'id(g_mode) = 6;', script.execute: ui_render ] }
                - if: { condition: { lambda: 'return id(g_disp_idx) == 1;' }, then: [ lambda: 'id(g_night) = !id(g_night);', script.execute: night_apply, script.execute: ui_render ] }
                - if: { condition: { lambda: 'return id(g_disp_idx) == 2;' }, then: [ lambda: 'id(g_mode) = 25;', script.execute: ui_render ] }
                - if: { condition: { lambda: 'return id(g_disp_idx) == 3;' }, then: [ lambda: 'id(g_mode) = 26;', script.execute: ui_render ] }
                - if: { condition: { lambda: 'return id(g_disp_idx) == 4;' }, then: [ lambda: 'id(g_mode) = 24;', script.execute: ui_render ] }
          - if:   # back -> settings list
              condition: { lambda: 'return id(g_gesture) == 3 || id(g_gesture) == 1;' }
              then:
                - lambda: 'id(g_mode) = 5;'
                - script.execute: ui_render
    # === HOME (12) === tap: 0=toggle weather widget, 1=toggle climate widget, 2=cycle watchface; right/hold=back
    - if:
        condition: { lambda: 'return id(g_mode0) == 12;' }
        then:
          - if: { condition: { lambda: 'return id(g_gesture) == 0 && id(g_sub_idx) == 0;' }, then: [ lambda: 'id(g_show_weather) = !id(g_show_weather);', script.execute: disp_apply, script.execute: ui_render ] }
          - if: { condition: { lambda: 'return id(g_gesture) == 0 && id(g_sub_idx) == 1;' }, then: [ lambda: 'id(g_show_climate) = !id(g_show_climate);', script.execute: disp_apply, script.execute: ui_render ] }
          - if: { condition: { lambda: 'return id(g_gesture) == 0 && id(g_sub_idx) == 2;' }, then: [ lambda: 'id(g_watchface) = (id(g_watchface) + 1) % 2;', script.execute: home_roller_build, script.execute: face_apply, script.execute: ui_render ] }
          - if: { condition: { lambda: 'return id(g_gesture) == 3 || id(g_gesture) == 1;' }, then: [ lambda: 'id(g_mode) = 5;', script.execute: ui_render ] }
    # === WIDGETS (17) === list of per-screen groups; tap opens one; right/hold = back to settings
    - if:
        condition: { lambda: 'return id(g_mode0) == 17;' }
        then:
          - if:
              condition: { lambda: 'return id(g_gesture) == 0 && id(g_wgrp_n) > 0;' }
              then:
                - lambda: |-
                    int g = id(g_wgrp_idx);
                    id(g_wcur_n) = 0;
                    for (int o = 0; o < id(g_wopt_n); o++) if (id(g_wopt_group)[o] == g) id(g_wcur_opts)[id(g_wcur_n)++] = o;
                    std::string s; for (int k = 0; k < id(g_wcur_n); k++) { if (k) s += "\n"; s += id(g_wopt_label)[id(g_wcur_opts)[k]]; }
                    lv_roller_set_options(id(wopt_roller)->obj, s.c_str(), LV_ROLLER_MODE_NORMAL);
                    id(g_wcur_name) = ""; { std::string gl = id(g_wgrp_labels); int idx = 0; size_t pp = 0; while (true) { size_t nl = gl.find('\n', pp); std::string tok = (nl == std::string::npos) ? gl.substr(pp) : gl.substr(pp, nl - pp); if (idx == g) { id(g_wcur_name) = tok; break; } if (nl == std::string::npos) break; pp = nl + 1; idx++; } }
                    id(g_wopt_idx) = 0; id(g_mode) = 30;
                - script.execute: ui_render
          - if: { condition: { lambda: 'return id(g_gesture) == 3 || id(g_gesture) == 1;' }, then: [ lambda: 'id(g_mode) = 5;', script.execute: ui_render ] }
    # === WIDGET OPTIONS (30) === tap: toggle / confirm action; right/hold = back to Widgets
    - if:
        condition: { lambda: 'return id(g_mode0) == 30;' }
        then:
          - if:
              condition: { lambda: 'return id(g_gesture) == 0 && id(g_wcur_n) > 0;' }
              then:
                - if:
                    condition: { lambda: 'return id(g_wopt_kind)[id(g_wcur_opts)[id(g_wopt_idx)]] == 0;' }
                    then: [ lambda: 'int o = id(g_wcur_opts)[id(g_wopt_idx)]; if (id(g_wopt_ptr)[o]) *id(g_wopt_ptr)[o] = !*id(g_wopt_ptr)[o];', script.execute: ui_render ]
                    else: [ lambda: 'id(g_mode) = 31;', script.execute: ui_render ]
          - if: { condition: { lambda: 'return id(g_gesture) == 3 || id(g_gesture) == 1;' }, then: [ lambda: 'id(g_mode) = 17;', script.execute: ui_render ] }
    # === CONFIRM (31) === generic action confirm; tap = YES (fire), right/hold = NO
    - if:
        condition: { lambda: 'return id(g_mode0) == 31;' }
        then:
          - if: { condition: { lambda: 'return id(g_gesture) == 0 && id(g_wcur_n) > 0;' }, then: [ lambda: 'int o = id(g_wcur_opts)[id(g_wopt_idx)]; if (id(g_wopt_ptr)[o]) *id(g_wopt_ptr)[o] = true; id(g_mode) = 30;', script.execute: ui_render ] }
          - if: { condition: { lambda: 'return id(g_gesture) == 3 || id(g_gesture) == 1;' }, then: [ lambda: 'id(g_mode) = 30;', script.execute: ui_render ] }
    # === ASSISTANT (13) === tap: 0=toggle wake word, 1=toggle beep; right/hold=back
    - if:
        condition: { lambda: 'return id(g_mode0) == 13;' }
        then:
          - if:
              condition: { lambda: 'return id(g_gesture) == 0 && id(g_sub_idx) == 0;' }
              then:
                - lambda: 'id(g_ww_on) = !id(g_ww_on);'
                - if:
                    condition: { lambda: 'return id(g_ww_on);' }
                    then: [micro_wake_word.start: {}]
                    else: [micro_wake_word.stop: {}]
                - script.execute: ui_render
          - if: { condition: { lambda: 'return id(g_gesture) == 0 && id(g_sub_idx) == 1;' }, then: [ lambda: 'id(g_beep_ww) = !id(g_beep_ww);', script.execute: ui_render ] }
          - if: { condition: { lambda: 'return id(g_gesture) == 0 && id(g_sub_idx) == 2;' }, then: [ lambda: 'id(g_hold_talk) = !id(g_hold_talk);', script.execute: ui_render ] }
          - if: { condition: { lambda: 'return id(g_gesture) == 3 || id(g_gesture) == 1;' }, then: [ lambda: 'id(g_mode) = 5;', script.execute: ui_render ] }
    # === SYSTEM (15) ===
    - if:
        condition: { lambda: 'return id(g_mode0) == 15;' }
        then:
          - if:
              condition: { lambda: 'return id(g_gesture) == 0;' }
              then:
                - if: { condition: { lambda: 'return id(g_sub_idx) == 0;' }, then: [ lambda: 'id(g_mode) = 7;', script.execute: ui_render ] }
                - if: { condition: { lambda: 'return id(g_sub_idx) == 1;' }, then: [ lambda: 'id(g_mode) = 23;', script.execute: ui_render ] }
                - if: { condition: { lambda: 'return id(g_sub_idx) == 2;' }, then: [ lambda: 'id(g_mode) = 9;', script.execute: ui_render ] }
                - if: { condition: { lambda: 'return id(g_sub_idx) == 3;' }, then: [ lambda: 'id(g_mode) = 22;', script.execute: ui_render ] }
          - if: { condition: { lambda: 'return id(g_gesture) == 3 || id(g_gesture) == 1;' }, then: [ lambda: 'id(g_mode) = 5;', script.execute: ui_render ] }
    # === RING (16) === tap: toggle the selected reaction; right/hold = back
    - if:
        condition: { lambda: 'return id(g_mode0) == 16;' }
        then:
          - if:
              condition: { lambda: 'return id(g_gesture) == 0;' }
              then:
                - if: { condition: { lambda: 'return id(g_sub_idx) == 0;' }, then: [ lambda: 'id(g_ring_va) = !id(g_ring_va);', script.execute: ring_update, script.execute: ui_render ] }
                - if: { condition: { lambda: 'return id(g_sub_idx) == 1;' }, then: [ lambda: 'id(g_ring_timer) = !id(g_ring_timer);', script.execute: ring_update, script.execute: ui_render ] }
                - if: { condition: { lambda: 'return id(g_sub_idx) == 2;' }, then: [ lambda: 'id(g_ring_alarm) = !id(g_ring_alarm);', script.execute: ring_update, script.execute: ui_render ] }
                - if: { condition: { lambda: 'return id(g_sub_idx) == 3;' }, then: [ lambda: 'id(g_ring_vol_en) = !id(g_ring_vol_en);', script.execute: ring_update, script.execute: ui_render ] }
          - if: { condition: { lambda: 'return id(g_gesture) == 3 || id(g_gesture) == 1;' }, then: [ lambda: 'id(g_mode) = 5;', script.execute: ui_render ] }
    # === RESTART confirm (9) === tap = YES (restart); right/hold = NO
    - if:
        condition:
          lambda: 'return id(g_mode0) == 9;'
        then:
          - if:
              condition: { lambda: 'return id(g_gesture) == 0;' }
              then:
                - button.press: btn_restart
          - if:
              condition: { lambda: 'return id(g_gesture) == 3 || id(g_gesture) == 1;' }
              then:
                - lambda: 'id(g_mode) = 5;'
                - script.execute: ui_render
    # === BRIGHTNESS (6) === any gesture = return to Display (we enter from there)
    - if:
        condition:
          lambda: 'return id(g_mode0) == 6;'
        then:
          - if:
              condition: { lambda: 'return id(g_gesture) >= 0;' }
              then:
                - lambda: 'id(g_mode) = 11;'
                - script.execute: ui_render
    # === SCREEN OFF (24) === any gesture = return to Display
    - if:
        condition: { lambda: 'return id(g_mode0) == 24;' }
        then:
          - if:
              condition: { lambda: 'return id(g_gesture) >= 0;' }
              then: [ lambda: 'id(g_mode) = 11;', script.execute: ui_render ]
    # === NIGHT FROM/TO (25/26) === any gesture = return to Display
    - if:
        condition: { lambda: 'return id(g_mode0) == 25 || id(g_mode0) == 26;' }
        then:
          - if: { condition: { lambda: 'return id(g_gesture) >= 0;' }, then: [ lambda: 'id(g_mode) = 11;', script.execute: ui_render ] }
    # === BATTERY (23) === any gesture = return to System
    - if:
        condition: { lambda: 'return id(g_mode0) == 23;' }
        then:
          - if: { condition: { lambda: 'return id(g_gesture) >= 0;' }, then: [ lambda: 'id(g_mode) = 15;', script.execute: ui_render ] }
    # === FACTORY confirm (22) === tap=YES (reset+restart); right/hold=NO
    - if:
        condition: { lambda: 'return id(g_mode0) == 22;' }
        then:
          - if:
              condition: { lambda: 'return id(g_gesture) == 0;' }
              then:
                - lambda: |-
                    id(g_bright)=100; id(g_night)=false; id(g_show_weather)=false; id(g_show_climate)=false; id(g_watchface)=0; id(g_ww_on)=true; id(g_set_min)=60; id(g_beep_ww)=true; id(g_hold_talk)=true; id(g_night_from)=22; id(g_night_to)=7; id(g_blank_idx)=0; id(g_factory_reset)=true;
                - button.press: btn_restart
          - if: { condition: { lambda: 'return id(g_gesture) == 3 || id(g_gesture) == 1;' }, then: [ lambda: 'id(g_mode) = 15;', script.execute: ui_render ] }
    # === INFO (7) === any gesture = return to the settings list
    - if:
        condition:
          lambda: 'return id(g_mode0) == 7;'
        then:
          - if:
              condition: { lambda: 'return id(g_gesture) >= 0;' }
              then:
                - lambda: 'id(g_mode) = 5;'
                - script.execute: ui_render

