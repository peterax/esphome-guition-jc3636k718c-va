  buffer_size: 24%
  displays:
    - main_display
  touchscreens:
    - my_touchscreen
  # Always-on-top layer: assistant overlay (dim + frame + text)
  top_layer:
    widgets:
      - obj:
          id: va_dim
          x: 0
          y: 0
          width: 360
          height: 360
          radius: 0
          border_width: 0
          bg_color: 0x000000
          bg_opa: 100%
