      - if: { condition: { lambda: 'return id(g_sn_fi)[0] == 10;' }, then: [ lvgl.image.update: { id: sn_fruit0, src: img_sn_fruit10 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[0] == 11;' }, then: [ lvgl.image.update: { id: sn_fruit0, src: img_sn_fruit11 } ] }
