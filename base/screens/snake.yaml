# Snake - optional carousel screen (base id 9). Free 360-degree snake steered by the knob.
# Remove it: drop this file from your config's package "files:" list. Nothing else to edit.
# Scores (g_sn_top / g_sn_best) + the "Reset scores" settings action live here - fully self-contained.
#
# This file is GENERATED by scripts/gen_snake.py (the 40-segment body pool, fruit rotation and
# their per-tick updates are repetitive). Edit the generator, not the blocks.

esphome:
  on_boot:
    - priority: 655
      then:
        - lambda: 'id(g_present)[9] = true;'   # register after clock/player/timer/cars/space
    - priority: 650
      then:
        - lambda: |-
            int g = id(g_wgrp_n)++;
            id(g_wgrp_labels) += (g ? "\n" : ""); id(g_wgrp_labels) += "Snake";
            int o = id(g_wopt_n)++;
            id(g_wopt_group)[o] = g; id(g_wopt_label)[o] = "Reset scores"; id(g_wopt_kind)[o] = 1; id(g_wopt_ptr)[o] = &id(g_sn_reset);

globals:
  # --- scores (persistent) + reset flag ---
  - id: g_sn_best
    type: int
    restore_value: yes
    initial_value: '0'
  - id: g_sn_top
    type: int[10]
    restore_value: yes
  - id: g_sn_reset
    type: bool
    restore_value: no
    initial_value: 'false'
  # --- game state ---
  - id: g_sn_state    # 0=menu 1=playing 2=game over 3=how-to 4=scores
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_len      # live body segments
    type: int
    restore_value: no
    initial_value: '5'
  - id: g_sn_score
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_x        # segment X (centre coords, px); [0] = head
    type: float[40]
    restore_value: no
  - id: g_sn_y
    type: float[40]
    restore_value: no
  - id: g_sn_ang      # heading (radians)
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: g_sn_dead
    type: bool
    restore_value: no
    initial_value: 'false'
  # --- fruit slots (up to 3) ---
  - id: g_sn_fx
    type: float[3]
    restore_value: no
  - id: g_sn_fy
    type: float[3]
    restore_value: no
  - id: g_sn_fi       # sprite index per slot
    type: int[3]
    restore_value: no
  - id: g_sn_fon      # slot occupied
    type: bool[3]
    restore_value: no
  - id: g_sn_fclk     # fruit spawn clock (ticks)
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_newfruit # slot that just spawned and needs its sprite set (-1 = none)
    type: int
    restore_value: no
    initial_value: '-1'
  # --- skull slots (up to 2) ---
  - id: g_sn_skx
    type: float[2]
    restore_value: no
  - id: g_sn_sky
    type: float[2]
    restore_value: no
  - id: g_sn_skon
    type: bool[2]
    restore_value: no
  - id: g_sn_skage    # per-skull lifetime counter (ticks)
    type: int[2]
    restore_value: no
  - id: g_sn_skclk    # skull spawn clock (ticks)
    type: int
    restore_value: no
    initial_value: '0'

