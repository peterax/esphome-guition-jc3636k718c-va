    then:
      - lvgl.widget.update: { id: sn_fruit1, hidden: false, x: !lambda 'return (int) lroundf(id(g_sn_fx)[1]);', y: !lambda 'return (int) lroundf(id(g_sn_fy)[1]);' }
      - if: { condition: { lambda: 'return id(g_sn_fi)[1] == 0;' }, then: [ lvgl.image.update: { id: sn_fruit1, src: img_sn_fruit0 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[1] == 1;' }, then: [ lvgl.image.update: { id: sn_fruit1, src: img_sn_fruit1 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[1] == 2;' }, then: [ lvgl.image.update: { id: sn_fruit1, src: img_sn_fruit2 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[1] == 3;' }, then: [ lvgl.image.update: { id: sn_fruit1, src: img_sn_fruit3 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[1] == 4;' }, then: [ lvgl.image.update: { id: sn_fruit1, src: img_sn_fruit4 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[1] == 5;' }, then: [ lvgl.image.update: { id: sn_fruit1, src: img_sn_fruit5 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[1] == 6;' }, then: [ lvgl.image.update: { id: sn_fruit1, src: img_sn_fruit6 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[1] == 7;' }, then: [ lvgl.image.update: { id: sn_fruit1, src: img_sn_fruit7 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[1] == 8;' }, then: [ lvgl.image.update: { id: sn_fruit1, src: img_sn_fruit8 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[1] == 9;' }, then: [ lvgl.image.update: { id: sn_fruit1, src: img_sn_fruit9 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[1] == 10;' }, then: [ lvgl.image.update: { id: sn_fruit1, src: img_sn_fruit10 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[1] == 11;' }, then: [ lvgl.image.update: { id: sn_fruit1, src: img_sn_fruit11 } ] }
  - id: sn_fspr2
    then:
      - lvgl.widget.update: { id: sn_fruit2, hidden: false, x: !lambda 'return (int) lroundf(id(g_sn_fx)[2]);', y: !lambda 'return (int) lroundf(id(g_sn_fy)[2]);' }
      - if: { condition: { lambda: 'return id(g_sn_fi)[2] == 0;' }, then: [ lvgl.image.update: { id: sn_fruit2, src: img_sn_fruit0 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[2] == 1;' }, then: [ lvgl.image.update: { id: sn_fruit2, src: img_sn_fruit1 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[2] == 2;' }, then: [ lvgl.image.update: { id: sn_fruit2, src: img_sn_fruit2 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[2] == 3;' }, then: [ lvgl.image.update: { id: sn_fruit2, src: img_sn_fruit3 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[2] == 4;' }, then: [ lvgl.image.update: { id: sn_fruit2, src: img_sn_fruit4 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[2] == 5;' }, then: [ lvgl.image.update: { id: sn_fruit2, src: img_sn_fruit5 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[2] == 6;' }, then: [ lvgl.image.update: { id: sn_fruit2, src: img_sn_fruit6 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[2] == 7;' }, then: [ lvgl.image.update: { id: sn_fruit2, src: img_sn_fruit7 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[2] == 8;' }, then: [ lvgl.image.update: { id: sn_fruit2, src: img_sn_fruit8 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[2] == 9;' }, then: [ lvgl.image.update: { id: sn_fruit2, src: img_sn_fruit9 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[2] == 10;' }, then: [ lvgl.image.update: { id: sn_fruit2, src: img_sn_fruit10 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi)[2] == 11;' }, then: [ lvgl.image.update: { id: sn_fruit2, src: img_sn_fruit11 } ] }
  - id: sn_hud
    then:
      - lvgl.label.update: { id: lbl_sn_score, text: !lambda 'char b[12]; snprintf(b,sizeof(b),"%d",id(g_sn_score)); return std::string(b);' }
  - id: sn_items
    then:
      - lvgl.widget.update: { id: sn_fruit0, hidden: !lambda 'return !id(g_sn_fon)[0];' }
      - lvgl.widget.update: { id: sn_fruit1, hidden: !lambda 'return !id(g_sn_fon)[1];' }
      - lvgl.widget.update: { id: sn_fruit2, hidden: !lambda 'return !id(g_sn_fon)[2];' }
      - lvgl.widget.update: { id: sn_skull0, hidden: !lambda 'return !id(g_sn_skon)[0];' }
      - lvgl.widget.update: { id: sn_skull1, hidden: !lambda 'return !id(g_sn_skon)[1];' }
  # full body redraw - used at start / when (re)entering the play screen (one lambda, not per tick)
  - id: sn_drawfull
    then:
      - lambda: |-
          lv_obj_t *SS[56] = { id(sn_seg0), id(sn_seg1), id(sn_seg2), id(sn_seg3), id(sn_seg4), id(sn_seg5), id(sn_seg6), id(sn_seg7), id(sn_seg8), id(sn_seg9), id(sn_seg10), id(sn_seg11), id(sn_seg12), id(sn_seg13), id(sn_seg14), id(sn_seg15), id(sn_seg16), id(sn_seg17), id(sn_seg18), id(sn_seg19), id(sn_seg20), id(sn_seg21), id(sn_seg22), id(sn_seg23), id(sn_seg24), id(sn_seg25), id(sn_seg26), id(sn_seg27), id(sn_seg28), id(sn_seg29), id(sn_seg30), id(sn_seg31), id(sn_seg32), id(sn_seg33), id(sn_seg34), id(sn_seg35), id(sn_seg36), id(sn_seg37), id(sn_seg38), id(sn_seg39), id(sn_seg40), id(sn_seg41), id(sn_seg42), id(sn_seg43), id(sn_seg44), id(sn_seg45), id(sn_seg46), id(sn_seg47), id(sn_seg48), id(sn_seg49), id(sn_seg50), id(sn_seg51), id(sn_seg52), id(sn_seg53), id(sn_seg54), id(sn_seg55) };
          for (int k = 0; k < 56; k++) {
            int d = (id(g_sn_head) - k + 224) % 56;
            if (d < id(g_sn_len)) lv_obj_set_pos(SS[k], 180 + (int) lroundf(id(g_sn_tx)[k]) - 4, 180 + (int) lroundf(id(g_sn_ty)[k]) - 4);
            else lv_obj_set_pos(SS[k], 400, 400);
          }
          lv_obj_set_pos(id(sn_head), 180 + (int) lroundf(id(g_sn_hx)) - 4, 180 + (int) lroundf(id(g_sn_hy)) - 4);
      - script.execute: sn_items
  # hide every gameplay widget (park body off-screen + hide fruit/skulls)
  - id: sn_clear
    then:
      - lambda: |-
          lv_obj_t *SS[56] = { id(sn_seg0), id(sn_seg1), id(sn_seg2), id(sn_seg3), id(sn_seg4), id(sn_seg5), id(sn_seg6), id(sn_seg7), id(sn_seg8), id(sn_seg9), id(sn_seg10), id(sn_seg11), id(sn_seg12), id(sn_seg13), id(sn_seg14), id(sn_seg15), id(sn_seg16), id(sn_seg17), id(sn_seg18), id(sn_seg19), id(sn_seg20), id(sn_seg21), id(sn_seg22), id(sn_seg23), id(sn_seg24), id(sn_seg25), id(sn_seg26), id(sn_seg27), id(sn_seg28), id(sn_seg29), id(sn_seg30), id(sn_seg31), id(sn_seg32), id(sn_seg33), id(sn_seg34), id(sn_seg35), id(sn_seg36), id(sn_seg37), id(sn_seg38), id(sn_seg39), id(sn_seg40), id(sn_seg41), id(sn_seg42), id(sn_seg43), id(sn_seg44), id(sn_seg45), id(sn_seg46), id(sn_seg47), id(sn_seg48), id(sn_seg49), id(sn_seg50), id(sn_seg51), id(sn_seg52), id(sn_seg53), id(sn_seg54), id(sn_seg55) };
          for (int k = 0; k < 56; k++) lv_obj_set_pos(SS[k], 400, 400);
          lv_obj_set_pos(id(sn_head), 400, 400);
      - lvgl.widget.hide: sn_fruit0
      - lvgl.widget.hide: sn_fruit1
      - lvgl.widget.hide: sn_fruit2
      - lvgl.widget.hide: sn_skull0
      - lvgl.widget.hide: sn_skull1
  - id: sn_start
    then:
      - lambda: |-
          id(g_sn_state) = 1; id(g_sn_score) = 0; id(g_sn_dead) = false;
          id(g_sn_ang) = -1.5708f; id(g_sn_grow) = 0;            // heading up
          id(g_sn_len) = 5; id(g_sn_head) = 4;
          for (int i = 0; i < 56; i++) { id(g_sn_tx)[i] = 0.0f; id(g_sn_ty)[i] = 0.0f; }
          for (int k = 0; k < 5; k++) { id(g_sn_tx)[k] = 0.0f; id(g_sn_ty)[k] = (4 - k) * 8.0f; }
          id(g_sn_hx) = 0.0f; id(g_sn_hy) = 0.0f;
          for (int s = 0; s < 3; s++) id(g_sn_fon)[s] = false;
          for (int s = 0; s < 2; s++) { id(g_sn_skon)[s] = false; id(g_sn_skage)[s] = 0; }
          id(g_sn_fclk) = 0; id(g_sn_skclk) = 0;
          id(g_sn_newfruit) = -1; id(g_sn_newskull) = -1; id(g_sn_add) = -1; id(g_sn_del) = -1;
          id(g_knob_capture) = true; id(g_knob_delta) = 0;
          float a = (esp_random() % 62832) / 10000.0f; float rad = 60.0f + (esp_random() % 80);
          id(g_sn_fx)[0] = cosf(a)*rad; id(g_sn_fy)[0] = sinf(a)*rad;
          id(g_sn_fi)[0] = esp_random() % 12; id(g_sn_fon)[0] = true;
      - script.execute: sn_fspr0
      - script.execute: sn_screen
      - script.execute: sn_drawfull
      - script.execute: sn_hud
  - id: sn_over
    then:
      - lambda: |-
          id(g_sn_state) = 2;
          int s = id(g_sn_score);
          if (s > id(g_sn_best)) id(g_sn_best) = s;
          for (int i = 0; i < 10; i++) {
            if (s > id(g_sn_top)[i]) {
              for (int j = 9; j > i; j--) id(g_sn_top)[j] = id(g_sn_top)[j-1];
              id(g_sn_top)[i] = s;
              break;
            }
          }
      - script.execute: sn_screen
  # screen state + the single knob-capture authority (captured only in play + game over)
  - id: sn_screen
    then:
      - lambda: 'id(g_knob_capture) = (id(g_sn_state) == 1 || id(g_sn_state) == 2);'
      - lvgl.widget.hide: sn_ring
      - script.execute: sn_clear
      - lvgl.widget.hide: lbl_sn_score
      - lvgl.widget.hide: sn_logo
      - lvgl.widget.hide: btn_sn_start
      - lvgl.widget.hide: btn_sn_howto
      - lvgl.widget.hide: btn_sn_scores
      - lvgl.widget.hide: lbl_sn_over
      - lvgl.widget.hide: lbl_sn_rec
      - lvgl.widget.hide: btn_sn_replay
      - lvgl.widget.hide: btn_sn_exit
      - lvgl.widget.hide: lbl_sn_howto_t
      - lvgl.widget.hide: sn_b1
      - lvgl.widget.hide: sn_b2
      - lvgl.widget.hide: sn_b3
      - lvgl.widget.hide: sn_b4
      - lvgl.widget.hide: lbl_sn_howto1
      - lvgl.widget.hide: lbl_sn_howto2
      - lvgl.widget.hide: lbl_sn_howto3
      - lvgl.widget.hide: lbl_sn_howto4
      - lvgl.widget.hide: lbl_sn_scores_t
      - lvgl.widget.hide: lbl_sn_scores1
      - lvgl.widget.hide: lbl_sn_scores2
      - lvgl.widget.hide: btn_sn_back
      - if:   # MENU
          condition: { lambda: 'return id(g_sn_state) == 0;' }
          then:
            - lvgl.widget.show: sn_logo
            - lvgl.widget.show: btn_sn_start
            - lvgl.widget.show: btn_sn_howto
            - lvgl.widget.show: btn_sn_scores
      - if:   # PLAY
          condition: { lambda: 'return id(g_sn_state) == 1;' }
          then:
            - lvgl.widget.show: sn_ring
            - lvgl.widget.show: lbl_sn_score
            - script.execute: sn_drawfull
      - if:   # GAME OVER
          condition: { lambda: 'return id(g_sn_state) == 2;' }
          then:
            - lvgl.widget.show: sn_logo
            - lvgl.widget.show: lbl_sn_over
            - lvgl.widget.show: lbl_sn_rec
            - lvgl.widget.show: btn_sn_replay
            - lvgl.widget.show: btn_sn_exit
            - lvgl.label.update: { id: lbl_sn_over, text: !lambda 'char b[24]; snprintf(b,sizeof(b),"Score: %d", id(g_sn_score)); return std::string(b);' }
            - lvgl.label.update: { id: lbl_sn_rec,  text: !lambda 'char b[24]; snprintf(b,sizeof(b),"Best: %d", id(g_sn_best)); return std::string(b);' }
      - if:   # HOW TO PLAY
          condition: { lambda: 'return id(g_sn_state) == 3;' }
          then:
            - lvgl.widget.show: lbl_sn_howto_t
            - lvgl.widget.show: sn_b1
            - lvgl.widget.show: sn_b2
            - lvgl.widget.show: sn_b3
            - lvgl.widget.show: sn_b4
            - lvgl.widget.show: lbl_sn_howto1
            - lvgl.widget.show: lbl_sn_howto2
            - lvgl.widget.show: lbl_sn_howto3
            - lvgl.widget.show: lbl_sn_howto4
            - lvgl.widget.show: btn_sn_back
      - if:   # SCORES (top 10)
          condition: { lambda: 'return id(g_sn_state) == 4;' }
          then:
            - lvgl.widget.show: lbl_sn_scores_t
            - lvgl.widget.show: lbl_sn_scores1
            - lvgl.widget.show: lbl_sn_scores2
            - lvgl.widget.show: btn_sn_back
            - lvgl.label.update:
                id: lbl_sn_scores1
                text: !lambda |-
                  std::string s; char b[24];
                  for (int i = 0; i < 5; i++) { if(i) s += "\n"; if(id(g_sn_top)[i]>0){ snprintf(b,sizeof(b),"%d.  %d",i+1,id(g_sn_top)[i]); } else { snprintf(b,sizeof(b),"%d.  -",i+1); } s += b; }
                  return s;
            - lvgl.label.update:
                id: lbl_sn_scores2
                text: !lambda |-
                  std::string s; char b[24];
                  for (int i = 5; i < 10; i++) { if(i>5) s += "\n"; if(id(g_sn_top)[i]>0){ snprintf(b,sizeof(b),"%d.  %d",i+1,id(g_sn_top)[i]); } else { snprintf(b,sizeof(b),"%d.  -",i+1); } s += b; }
                  return s;

interval:
  - interval: 250ms
    then:
      - if:
          condition: { lambda: 'return id(g_sn_reset) || id(g_factory_reset);' }
          then:
            - lambda: 'for (int i = 0; i < 10; i++) id(g_sn_top)[i] = 0; id(g_sn_best) = 0; id(g_sn_reset) = false;'
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==9;' }
          then:
            - lambda: 'id(g_nav_req) = false; id(g_sn_state) = 0; id(g_knob_delta) = 0;'
            - if: { condition: { lambda: 'return id(g_nav_anim)==0;' }, then: [lvgl.page.show: { id: page_snake, animation: move_left,   time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==1;' }, then: [lvgl.page.show: { id: page_snake, animation: move_right,  time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==2;' }, then: [lvgl.page.show: { id: page_snake, animation: move_top,    time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==3;' }, then: [lvgl.page.show: { id: page_snake, animation: move_bottom, time: 250ms }] }
            - script.execute: sn_screen
  # Game tick: steer + glide head; lay/drop one trail dot when the head advanced SEG_DIST.
  # All body/head positioning is done IN this lambda (lv_obj_set_pos) to keep the action chain shallow.
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_base) == 9 && id(g_sn_state) == 1;' }
          then:
            - lambda: |-
                id(g_sn_add) = -1; id(g_sn_del) = -1; id(g_sn_newfruit) = -1; id(g_sn_newskull) = -1;
                int kd = id(g_knob_delta); id(g_knob_delta) = 0;
                id(g_sn_ang) += kd * 0.26f;
                float spd = 3.2f + id(g_sn_score) / 400.0f; if (spd > 5.5f) spd = 5.5f;
                float hx = id(g_sn_hx) + cosf(id(g_sn_ang)) * spd;
                float hy = id(g_sn_hy) + sinf(id(g_sn_ang)) * spd;
                if (hx*hx + hy*hy > 168.0f * 168.0f) { id(g_sn_dead) = true; }   // hit the ring
                else {
                  id(g_sn_hx) = hx; id(g_sn_hy) = hy;
                  int len = id(g_sn_len), head = id(g_sn_head);
                  for (int i = 6; i < len; i++) {
                    int sl = (head - i + 224) % 56;
                    float dx = hx - id(g_sn_tx)[sl], dy = hy - id(g_sn_ty)[sl];
                    if (dx*dx + dy*dy < 8.0f * 8.0f) { id(g_sn_dead) = true; break; }
                  }
                  for (int s = 0; s < 2; s++) if (id(g_sn_skon)[s]) {
                    float dx = hx - id(g_sn_skx)[s], dy = hy - id(g_sn_sky)[s];
                    if (dx*dx + dy*dy < 13.0f * 13.0f) { id(g_sn_dead) = true; }
                  }
                  for (int s = 0; s < 3 && !id(g_sn_dead); s++) if (id(g_sn_fon)[s]) {
                    float dx = hx - id(g_sn_fx)[s], dy = hy - id(g_sn_fy)[s];
                    if (dx*dx + dy*dy < 12.0f * 12.0f) { id(g_sn_fon)[s] = false; id(g_sn_score) += 10; id(g_sn_grow) += 3; }
                  }
                  if (!id(g_sn_dead)) {
                    float dx = hx - id(g_sn_tx)[head], dy = hy - id(g_sn_ty)[head];
                    if (dx*dx + dy*dy >= 8.0f * 8.0f) {
                      int nh = (head + 1) % 56;
                      id(g_sn_tx)[nh] = hx; id(g_sn_ty)[nh] = hy;
                      id(g_sn_head) = nh; id(g_sn_add) = nh;
                      if (id(g_sn_grow) > 0 && id(g_sn_len) < 56) { id(g_sn_grow)--; id(g_sn_len)++; id(g_sn_del) = -1; }
                      else { if (id(g_sn_grow) > 0) id(g_sn_grow)--; id(g_sn_del) = (head - id(g_sn_len) + 1 + 224) % 56; }
                    }
                  }
                }
                if (!id(g_sn_dead)) {
                  int fc = 0; for (int s = 0; s < 3; s++) if (id(g_sn_fon)[s]) fc++;
                  id(g_sn_fclk)++;
                  int wait = (fc <= 1) ? 45 : 90;
                  if (fc < 3 && id(g_sn_fclk) >= wait) {
                    id(g_sn_fclk) = 0;
                    int sl = -1; for (int s = 0; s < 3; s++) if (!id(g_sn_fon)[s]) { sl = s; break; }
                    if (sl >= 0) {
                      float a = (esp_random() % 62832) / 10000.0f; float rad = 25.0f + (esp_random() % 140);
                      id(g_sn_fx)[sl] = cosf(a)*rad; id(g_sn_fy)[sl] = sinf(a)*rad;
                      id(g_sn_fi)[sl] = esp_random() % 12; id(g_sn_fon)[sl] = true; id(g_sn_newfruit) = sl;
                    }
                  }
                  int sc = 0; for (int s = 0; s < 2; s++) if (id(g_sn_skon)[s]) sc++;
                  id(g_sn_skclk)++;
                  if (sc < 2 && id(g_sn_skclk) >= 200) {
                    id(g_sn_skclk) = 0;
                    int sl = -1; for (int s = 0; s < 2; s++) if (!id(g_sn_skon)[s]) { sl = s; break; }
                    if (sl >= 0) {
                      float a = (esp_random() % 62832) / 10000.0f; float rad = 30.0f + (esp_random() % 130);
                      id(g_sn_skx)[sl] = cosf(a)*rad; id(g_sn_sky)[sl] = sinf(a)*rad;
                      id(g_sn_skon)[sl] = true; id(g_sn_skage)[sl] = 0; id(g_sn_newskull) = sl;
                    }
                  }
                  for (int s = 0; s < 2; s++) if (id(g_sn_skon)[s]) { id(g_sn_skage)[s]++; if (id(g_sn_skage)[s] >= 220) id(g_sn_skon)[s] = false; }
                  // render (constant cost): head every tick + the one added/dropped dot
                  lv_obj_set_pos(id(sn_head), 180 + (int) lroundf(id(g_sn_hx)) - 4, 180 + (int) lroundf(id(g_sn_hy)) - 4);
                  if (id(g_sn_add) >= 0 || id(g_sn_del) >= 0) {
                    lv_obj_t *SS[56] = { id(sn_seg0), id(sn_seg1), id(sn_seg2), id(sn_seg3), id(sn_seg4), id(sn_seg5), id(sn_seg6), id(sn_seg7), id(sn_seg8), id(sn_seg9), id(sn_seg10), id(sn_seg11), id(sn_seg12), id(sn_seg13), id(sn_seg14), id(sn_seg15), id(sn_seg16), id(sn_seg17), id(sn_seg18), id(sn_seg19), id(sn_seg20), id(sn_seg21), id(sn_seg22), id(sn_seg23), id(sn_seg24), id(sn_seg25), id(sn_seg26), id(sn_seg27), id(sn_seg28), id(sn_seg29), id(sn_seg30), id(sn_seg31), id(sn_seg32), id(sn_seg33), id(sn_seg34), id(sn_seg35), id(sn_seg36), id(sn_seg37), id(sn_seg38), id(sn_seg39), id(sn_seg40), id(sn_seg41), id(sn_seg42), id(sn_seg43), id(sn_seg44), id(sn_seg45), id(sn_seg46), id(sn_seg47), id(sn_seg48), id(sn_seg49), id(sn_seg50), id(sn_seg51), id(sn_seg52), id(sn_seg53), id(sn_seg54), id(sn_seg55) };
                    if (id(g_sn_add) >= 0) lv_obj_set_pos(SS[id(g_sn_add)], 180 + (int) lroundf(id(g_sn_tx)[id(g_sn_add)]) - 4, 180 + (int) lroundf(id(g_sn_ty)[id(g_sn_add)]) - 4);
                    if (id(g_sn_del) >= 0) lv_obj_set_pos(SS[id(g_sn_del)], 400, 400);
                  }
                }
            - if:
                condition: { lambda: 'return id(g_sn_dead);' }
                then:
                  - script.execute: sn_over
                else:
                  - if:
                      condition: { lambda: 'return id(g_sn_newfruit) >= 0;' }
                      then:
                        - if: { condition: { lambda: 'return id(g_sn_newfruit) == 0;' }, then: [ script.execute: sn_fspr0 ] }
                        - if: { condition: { lambda: 'return id(g_sn_newfruit) == 1;' }, then: [ script.execute: sn_fspr1 ] }
                        - if: { condition: { lambda: 'return id(g_sn_newfruit) == 2;' }, then: [ script.execute: sn_fspr2 ] }
                  - if:
                      condition: { lambda: 'return id(g_sn_newskull) >= 0;' }
                      then:
                        - if: { condition: { lambda: 'return id(g_sn_newskull) == 0;' }, then: [ lvgl.widget.update: { id: sn_skull0, hidden: false, x: !lambda 'return (int) lroundf(id(g_sn_skx)[0]);', y: !lambda 'return (int) lroundf(id(g_sn_sky)[0]);' } ] }
                        - if: { condition: { lambda: 'return id(g_sn_newskull) == 1;' }, then: [ lvgl.widget.update: { id: sn_skull1, hidden: false, x: !lambda 'return (int) lroundf(id(g_sn_skx)[1]);', y: !lambda 'return (int) lroundf(id(g_sn_sky)[1]);' } ] }
                  - script.execute: sn_items
                  - script.execute: sn_hud

