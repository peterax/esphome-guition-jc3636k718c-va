lvgl:
  pages:
    # --- SPACE WARS page (game 2): vertical shooter ---
    - id: page_game2
      bg_color: 0x140A20
      scrollbar_mode: "off"
      scrollable: false
      widgets:
        - image: { id: sw_bg, align: CENTER, x: 0, y: 0, src: img_spacebg, hidden: true }
        - image: { id: sw_logo, align: CENTER, x: 0, y: 0, src: img_logo2, hidden: true }
        - obj: { id: b0, align: CENTER, x: 0, y: 0, width: 4, height: 14, radius: 2, border_width: 0, bg_color: 0xFFE45A, hidden: true }
        - obj: { id: b1, align: CENTER, x: 0, y: 0, width: 4, height: 14, radius: 2, border_width: 0, bg_color: 0xFFE45A, hidden: true }
        - obj: { id: eb0, align: CENTER, x: 0, y: 0, width: 5, height: 14, radius: 2, border_width: 0, bg_color: 0xFF5050, hidden: true }
        - obj: { id: eb1, align: CENTER, x: 0, y: 0, width: 5, height: 14, radius: 2, border_width: 0, bg_color: 0xFF5050, hidden: true }
        - image: { id: en0, align: CENTER, x: -60, y: -150, src: img_se1, hidden: true }
        - image: { id: en1, align: CENTER, x: 60, y: -150, src: img_se1, hidden: true }
        - image: { id: en2, align: CENTER, x: 0, y: -150, src: img_se2, hidden: true }
        - image: { id: sw_ship, align: CENTER, x: 0, y: 130, src: img_sp, hidden: true }
        - animimg:
            id: sw_exp
            align: CENTER
            x: 0
            y: 0
            src: [img_exp0, img_exp1, img_exp2, img_exp3, img_exp4, img_exp5]
            duration: 420ms
            repeat_count: 1
            auto_start: false
            hidden: true
        - label: { id: lbl_sw_lives, align: CENTER, x: -54, y: -132, text: "", text_font: icons18, text_color: 0xE24B4A, hidden: true }
        - label: { id: lbl_sw_score, align: CENTER, x: 54, y: -132, text: "0", text_font: font_med, text_color: 0xCFEAE4, hidden: true }
        - obj: { id: sw_flash, align: CENTER, x: 0, y: 0, width: 360, height: 360, radius: 0, border_width: 0, bg_color: 0xFF2A2A, bg_opa: 45%, hidden: true }
        # MENU
        - button:
            id: btn_sw_start
            align: CENTER
            y: 4
            width: 150
            height: 44
            radius: 22
            bg_color: 0xFF7A4D
            bg_opa: COVER
            border_width: 0
            on_click: [ script.execute: sw_start ]
            widgets: [ label: { align: CENTER, text: "Start", text_font: font_med, text_color: 0x2A0E06 } ]
        - button:
            id: btn_sw_howto
            align: CENTER
            y: 54
            width: 150
            height: 44
            radius: 22
            bg_color: 0x3A2150
